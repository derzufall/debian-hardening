    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]
    ansible.builtin.shell: "if [ -f /root/.bashrc ]; then sed -i 's/^umask.*/umask
      027/g' /root/.bashrc; else echo 'umask 027' >> /root/.bashrc; fi\nif [ -f /root/.profile
      ]; then sed -i 's/^umask.*/umask 027/g' /root/.profile; else echo 'umask 027'
      >> /root/.profile; fi\n"
    when: audit_5_4_2_6_0.rc != 0

    # ------------------------------------------------------------
    # 5.4.3 Configure user default environment
    # ------------------------------------------------------------
  - name: "5.4.3 Configure user default environment (Audit - Manual intervention required)"
    ansible.builtin.debug:
      msg: "Manual audit required"
    tags: ["cis", "manual"]

  - name: "5.4.3 Configure user default environment (Remediation - Manual intervention
      required)"
    ansible.builtin.debug:
      msg: "Manual remediation required"
    tags: ["cis", "manual"]

    # ------------------------------------------------------------
    # 5.4.3.1 Ensure nologin is not listed in /etc/shells
    # ------------------------------------------------------------
  - name: "5.4.3.1 Ensure nologin is not listed in /etc/shells (Audit)"
    ansible.builtin.shell: |
      grep -Ps '^\h*([^#\n\r]+)?\/nologin\b' /etc/shells
    register: audit_5_4_3_1_0
    changed_when: false
    failed_when: audit_5_4_3_1_0.stdout | length > 0
    ignore_errors: true
    tags: ["level_2__server", "level_2__workstation", "cis", "automated"]

  - name: "5.4.3.1 Ensure nologin is not listed in /etc/shells (Remediation)"
    tags: ["level_2__server", "level_2__workstation", "cis", "automated"]
    ansible.builtin.shell: "sed -i '/\\/nologin/d' /etc/shells\n"
    when: audit_5_4_3_1_0.rc != 0

    # ------------------------------------------------------------
    # 5.4.3.3 Ensure default user umask is configured
    # ------------------------------------------------------------
  - name: "5.4.3.3 Ensure default user umask is configured (Audit)"
    ansible.builtin.shell: |
      grep -Psi -- '^\h*umask\b' /etc/profile.d/*.sh
      grep -Psi -- '^\h*UMASK\b' /etc/login.defs
    register: audit_5_4_3_3_0
    changed_when: false
    failed_when: "'umask' not in audit_5_4_3_3_0.stdout and 'UMASK' not in audit_5_4_3_3_0.stdout"
    ignore_errors: true
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "5.4.3.3 Ensure default user umask is configured (Remediation)"
    ansible.builtin.shell: |
      #!/usr/bin/env bash
      {
        while IFS= read -r -d $'\0' l_file; do
          sed -ri '/^\s*umask\s+0?(0[01][0-7]|0[0-7][^7]|[^0][0-7][07])(\s*|\s+.*)$/s/^/# /' "$l_file"
        done < <(find /etc/profile.d/ -type f -name '*.sh' -print0)
      }
      printf '%s\n' "" "umask 027" >>/etc/profile.d/60-default_umask.sh
    register: rem_5_4_3_3_0
    changed_when: rem_5_4_3_3_0.rc == 0
    ignore_errors: true
    when: audit_5_4_3_3_0.rc != 0
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  post_tasks:
  - name: "Clean up the temporary directory"
    ansible.builtin.file:
      path: "{{ host_dest_dir_temp_cis }}"
      state: absent
    register: temp_cleanup
    changed_when: temp_cleanup.changed

