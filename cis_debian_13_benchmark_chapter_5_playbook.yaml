- name: "CIS Debian Linux 13 Benchmark Chapter 5 Playbook"
  hosts: all
  become: true
  gather_facts: true

  vars_files:
    - cis_vars.yaml

  vars:
    host_dest_dir_temp_base: "/tmp/cis_temp_dir"
    host_dest_file_ssh_config: "/etc/ssh/sshd_config"

  pre_tasks:
  - name: "Get current timestamp with millisecond precision"
    ansible.builtin.command: date +%s%3N
    register: timestamp_ms
    changed_when: false

  - name: "Gather package facts"
    ansible.builtin.package_facts:
      manager: auto

  - name: "Set temporary directory variable with timestamp"
    ansible.builtin.set_fact:
      host_dest_dir_temp_cis: "{{ host_dest_dir_temp_base }}_{{ timestamp_ms.stdout
        }}"

  - name: "Create the temporary directory"
    ansible.builtin.file:
      path: "{{ host_dest_dir_temp_cis }}"
      state: directory
      mode: "0700"
      owner: root
      group: root
    register: temp_dir_creation
    changed_when: temp_dir_creation.changed

  tasks:
    # ------------------------------------------------------------
    # 5.1 Configure SSH Server
    # ------------------------------------------------------------
  - name: "5.1 Configure SSH Server (Audit)"
    ansible.builtin.shell: |
      #!/usr/bin/env bash
      stat -Lc 'File: "%n" Mode: "%#a" Owner: "%U" Group: "%G"' /etc/ssh/sshd_config
      {
      while IFS= read -r -d $'\0' l_file; do
      stat -Lc 'File: "%n" Mode: "%#a" Owner: "%U" Group: "%G"' "$l_file"
      done < <(find /etc/ssh/sshd_config.d/ -xdev -mount -type f -name '*.conf' \( -perm /077 -o ! -user root -o ! -group root \) -print0 2>/dev/null)
      }
    register: audit_5_1_0
    changed_when: false
    failed_when: audit_5_1_0.stdout | length == 0 or '0600' not in audit_5_1_0.stdout
      or 'root' not in audit_5_1_0.stdout
    ignore_errors: true
    tags: ["level_1__server", "level_1__workstation", "cis", automated]

  - name: "5.1 Configure SSH Server (Remediation)"
    ansible.builtin.shell: |
      #!/usr/bin/env bash
      {
        chmod u-x,og-rwx /etc/ssh/sshd_config
        chown root:root /etc/ssh/sshd_config
        while IFS= read -r -d $'\0' l_file; do
          if [ -e "$l_file" ]; then
            chmod u-x,og-rwx "$l_file"
            chown root:root "$l_file"
          fi
        done < <(find /etc/ssh/sshd_config.d -type f -print0 2>/dev/null)
      }
    register: rem_5_1_0
    changed_when: rem_5_1_0.rc == 0
    ignore_errors: true
    when: audit_5_1_0.rc != 0
    tags: ["level_1__server", "level_1__workstation", "cis", "manual"]

    # ------------------------------------------------------------
    # 5.1.1 Ensure access to /etc/ssh/sshd_config is configured
    # ------------------------------------------------------------
  - name: "5.1.1 Ensure access to /etc/ssh/sshd_config is configured (Audit)"
    ansible.builtin.shell: |-
      stat -Lc 'Mode: "%#a" Owner: "%U" Group: "%G"' /etc/ssh/sshd_config | grep -E -q 'Mode: "(0600|0400)" Owner: "root" Group: "root"'
    register: audit_5_1_1_0
    changed_when: false
    failed_when: audit_5_1_1_0.rc != 0
    ignore_errors: true
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "5.1.1 Ensure access to /etc/ssh/sshd_config is configured (Remediation)"
    ansible.builtin.shell: |-
      chown root:root /etc/ssh/sshd_config 2>/dev/null || true
      chmod 0600 /etc/ssh/sshd_config 2>/dev/null || true
    register: rem_5_1_1_0
    changed_when: rem_5_1_1_0.rc == 0
    ignore_errors: true
    when: audit_5_1_1_0.rc != 0
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 5.1.4 Ensure sshd access is configured
    # ------------------------------------------------------------
  - name: "5.1.4 Ensure sshd access is configured (Audit - Default fallback (not Match
      set statements are used in SSH))"
    ansible.builtin.shell: |
      sshd -T | grep -Pi -- '^\h*(allow|deny)(users|groups)\h+\H+'
    register: audit_5_1_4_0
    changed_when: false
    failed_when: audit_5_1_4_0.stdout | length == 0
    ignore_errors: true
    when: not (cis_ssh_match_set_used | default(false) == true)
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "5.1.4 Ensure sshd access is configured (Audit - Match set statements are
      used in SSH)"
    ansible.builtin.shell: |
      sshd -T -C user=sshuser | grep -Pi -'^\h*(allow|deny)(users|groups)\h+\H+'
    register: audit_5_1_4_1
    changed_when: false
    failed_when: audit_5_1_4_1.stdout | length == 0
    ignore_errors: true
    when: cis_ssh_match_set_used | default(false) == true
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "5.1.4 Ensure sshd access is configured (Remediation)"
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]
    ansible.builtin.shell: "# Manual remediation required to choose AllowUsers or
      AllowGroups\n# This is a placeholder that does not automatically modify since
      user lists are site-specific.\necho 'Manual remediation required'\n"
    when: audit_5_1_4_0.rc != 0 and audit_5_1_4_1.rc != 0

    # ------------------------------------------------------------
    # 5.1.5 Ensure sshd Banner is configured
    # ------------------------------------------------------------
  - name: "5.1.5 Ensure sshd Banner is configured (Audit - Default fallback (not Match
      set statements are used in SSH))"
    ansible.builtin.shell: |-
      sshd -T | grep -Pi -- '^banner\h+\/\H+'
    register: audit_5_1_5_0
    changed_when: false
    failed_when: audit_5_1_5_0.stdout | length == 0
    ignore_errors: true
    when: not (cis_ssh_match_set_used | default(false) == true)
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "5.1.5 Ensure sshd Banner is configured (Audit - Match set statements are
      used in SSH)"
    ansible.builtin.shell:
      cmd: |
        sshd -T -C user=sshuser | grep -Pi -- '^banner\h+\/\H+'
        [ -e "$(sshd -T | awk '$1 == "banner" {print $2}')" ] && cat "$(sshd -T | awk '$1 == "banner" {print $2}')" | grep -Psi -- "(\\\v|\\\r|\\\m|\\\s|\b$(grep '^ID=' /etc/os-release | cut -d= -f2 | sed -e 's/\"//g')\b)"
    register: audit_5_1_5_1
    changed_when: false
    failed_when: audit_5_1_5_1.stdout | length == 0
    ignore_errors: true
    when: cis_ssh_match_set_used | default(false) == true
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "5.1.5 Ensure sshd Banner is configured (Remediation)"
    ansible.builtin.shell: |
      printf '%s\n' "Authorized users only. All activity may be monitored and reported." > "$(sshd -T | awk '$1 == "banner" {print $2}')"
    register: rem_5_1_5_0
    changed_when: rem_5_1_5_0.rc == 0
    ignore_errors: true
    when: audit_5_1_5_0.rc != 0
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 5.1.6 Ensure sshd Ciphers are configured
    # ------------------------------------------------------------
  - name: "5.1.6 Ensure sshd Ciphers are configured (Audit)"
    ansible.builtin.shell: |
      sshd -T | grep -Pi -'^ciphers\h+\"?([^#\n\r]+,)?((3des|blowfish|cast128|aes(128|192|256))cbc|arcfour(128|256)?|rijndael-cbc@lysator\.liu\.se)\b'
      sshd -T 2>&1 | awk '($1=="ciphers" && $2~/chacha20poly1305@openssh\.com/){print}'
    register: audit_5_1_6_0
    changed_when: false
    failed_when: audit_5_1_6_0.stdout | length > 0
    ignore_errors: true
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "5.1.6 Ensure sshd Ciphers are configured (Remediation - CVE-2023-48795
      has been addressed, and it meets local site policy,)"
    ansible.builtin.shell: |
      printf '%s\n' "# This is a subpolicy to disable weak ciphers" > /etc/ssh/sshd_config.d/weak-ciphers.conf
      update-crypto-policies --set DEFAULT:NO-SHA1:NO-WEAKMAC:NO-SSHCBC:NO-SSHCHACHA20:NO-SSHWEAKCIPHERS
      systemctl reload-or-restart sshd
    register: rem_5_1_6_0
    changed_when: rem_5_1_6_0.rc == 0
    ignore_errors: true
    when:
      - audit_5_1_6_0.rc != 0
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 5.1.8 Ensure sshd DisableForwarding is enabled
    # ------------------------------------------------------------
  - name: "5.1.8 Ensure sshd DisableForwarding is enabled (Audit)"
    ansible.builtin.shell: |
      sshd -T | grep disableforwarding
    register: audit_5_1_8_0
    changed_when: false
    failed_when: "'disableforwarding yes' not in audit_5_1_8_0.stdout | lower"
    ignore_errors: true
    tags: ["level_1__workstation", "level_2__server", "cis", "automated"]

  - name: "5.1.8 Ensure sshd DisableForwarding is enabled (Remediation)"
    tags: ["level_1__workstation", "level_2__server", "cis", "automated"]
    ansible.builtin.shell: "sed -i 's/^\\s*#\\s*DisableForwarding.*/DisableForwarding
      yes/g' /etc/ssh/sshd_config\nif ! grep -qi '^DisableForwarding yes' /etc/ssh/sshd_config;
      then echo 'DisableForwarding yes' >> /etc/ssh/sshd_config; fi\n"
    when: audit_5_1_8_0.rc != 0

    # ------------------------------------------------------------
    # 5.1.9 Ensure sshd GSSAPIAuthentication is disabled
    # ------------------------------------------------------------
  - name: "5.1.9 Ensure sshd GSSAPIAuthentication is disabled (Audit - Default fallback
      (not Match set statements are used in SSH))"
    ansible.builtin.shell: |
      sshd -T | grep gssapiauthentication
    register: audit_5_1_9_0
    changed_when: false
    failed_when: "'gssapiauthentication no' not in audit_5_1_9_0.stdout | lower"
    ignore_errors: true
    when: not (cis_ssh_match_set_used | default(false) == true)
    tags: ["level_1__workstation", "level_2__server", "cis", "automated"]

  - name: "5.1.9 Ensure sshd GSSAPIAuthentication is disabled (Audit - Match set statements
      are used in SSH)"
    ansible.builtin.shell: |
      sshd -T -C user=sshuser | grep gssapiauthentication
    register: audit_5_1_9_1
    changed_when: false
    failed_when: "'gssapiauthentication no' not in audit_5_1_9_1.stdout | lower"
    ignore_errors: true
    when: cis_ssh_match_set_used | default(false) == true
    tags: ["level_1__workstation", "level_2__server", "cis", "automated"]

  - name: "5.1.9 Ensure sshd GSSAPIAuthentication is disabled (Remediation)"
    tags: ["level_1__workstation", "level_2__server", "cis", "automated"]
    ansible.builtin.shell: "sed -i 's/^\\s*#\\s*GSSAPIAuthentication.*/GSSAPIAuthentication
      no/g' /etc/ssh/sshd_config\nif ! grep -qi '^GSSAPIAuthentication no' /etc/ssh/sshd_config;
      then echo 'GSSAPIAuthentication no' >> /etc/ssh/sshd_config; fi\n"
    when: audit_5_1_9_0.rc != 0

    # ------------------------------------------------------------
    # 5.1.11 Ensure sshd IgnoreRhosts is enabled
    # ------------------------------------------------------------
  - name: "5.1.11 Ensure sshd IgnoreRhosts is enabled (Audit)"
    ansible.builtin.shell: |
      sshd -T | grep ignorerhosts
    register: audit_5_1_11_0
    changed_when: false
    failed_when: "'ignorerhosts yes' not in audit_5_1_11_0.stdout | lower"
    ignore_errors: true
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "5.1.11 Ensure sshd IgnoreRhosts is enabled (Remediation)"
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]
    ansible.builtin.shell: "sed -i 's/^\\s*#\\s*IgnoreRhosts.*/IgnoreRhosts yes/g'
      /etc/ssh/sshd_config\nif ! grep -qi '^IgnoreRhosts yes' /etc/ssh/sshd_config;
      then echo 'IgnoreRhosts yes' >> /etc/ssh/sshd_config; fi\n"
    when: audit_5_1_11_0.rc != 0

    # ------------------------------------------------------------
    # 5.1.12 Ensure sshd KexAlgorithms is configured
    # ------------------------------------------------------------
  - name: "5.1.12 Ensure sshd KexAlgorithms is configured (Audit)"
    ansible.builtin.shell: |
      sshd -T | grep -Pi -- 'kexalgorithms\h+([^#\n\r]+,)?(diffie-hellman-group1sha1|diffie-hellman-group14-sha1|diffie-hellman-group-exchange-sha1)\b'
    register: audit_5_1_12_0
    changed_when: false
    failed_when: audit_5_1_12_0.stdout | length > 0
    ignore_errors: true
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "5.1.12 Ensure sshd KexAlgorithms is configured (Remediation)"
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]
    ansible.builtin.shell: "if grep -qi '^KexAlgorithms' /etc/ssh/sshd_config; then
      sed -i 's/^KexAlgorithms.*/KexAlgorithms -diffie-hellman-group1-sha1,diffie-hellman-group14-sha1,diffie-hellman-group-exchange-sha1/'
      /etc/ssh/sshd_config; else echo 'KexAlgorithms -diffie-hellman-group1-sha1,diffie-hellman-group14-sha1,diffie-hellman-group-exchange-sha1'
      >> /etc/ssh/sshd_config; fi\n"
    when: audit_5_1_12_0.rc != 0

    # ------------------------------------------------------------
    # 5.1.14 Ensure sshd LoginGraceTime is configured
    # ------------------------------------------------------------
  - name: "5.1.14 Ensure sshd LoginGraceTime is configured (Audit)"
    ansible.builtin.shell: |
      sshd -T | grep logingracetime
    register: audit_5_1_14_0
    changed_when: false
    failed_when: audit_5_1_14_0.stdout | length == 0 or (audit_5_1_14_0.stdout.split()
      | last | int == 0) or (audit_5_1_14_0.stdout.split() | last | int > 60)
    ignore_errors: true
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "5.1.14 Ensure sshd LoginGraceTime is configured (Remediation)"
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]
    ansible.builtin.shell: "sed -i 's/^\\s*#\\s*LoginGraceTime.*/LoginGraceTime 60/g'
      /etc/ssh/sshd_config\nif ! grep -qi '^LoginGraceTime ' /etc/ssh/sshd_config;
      then echo 'LoginGraceTime 60' >> /etc/ssh/sshd_config; else sed -i 's/^LoginGraceTime.*/LoginGraceTime
      60/' /etc/ssh/sshd_config; fi\n"
    when: audit_5_1_14_0.rc != 0

    # ------------------------------------------------------------
    # 5.1.15 Ensure sshd LogLevel is configured
    # ------------------------------------------------------------
  - name: "5.1.15 Ensure sshd LogLevel is configured (Audit - Default fallback (not
      Match set statements are used in SSH))"
    ansible.builtin.shell: |
      sshd -T | grep loglevel
    register: audit_5_1_15_0
    changed_when: false
    failed_when: "'LOGLEVEL VERBOSE' not in audit_5_1_15_0.stdout | upper and 'LOGLEVEL INFO' not in audit_5_1_15_0.stdout | upper"
    ignore_errors: true
    when: not (cis_ssh_match_set_used | default(false) == true)
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "5.1.15 Ensure sshd LogLevel is configured (Audit - Match set statements
      are used in SSH)"
    ansible.builtin.shell: |
      sshd -T -C user=sshuser | grep loglevel
    register: audit_5_1_15_1
    changed_when: false
    failed_when: "'LOGLEVEL VERBOSE' not in audit_5_1_15_1.stdout | upper and 'LOGLEVEL INFO' not in audit_5_1_15_1.stdout | upper"
    ignore_errors: true
    when: cis_ssh_match_set_used | default(false) == true
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "5.1.15 Ensure sshd LogLevel is configured (Remediation)"
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]
    ansible.builtin.shell: "sed -i 's/^\\s*#\\s*LogLevel.*/LogLevel INFO/g' /etc/ssh/sshd_config\n
      if ! grep -qi '^LogLevel ' /etc/ssh/sshd_config; then echo 'LogLevel INFO' >>
      /etc/ssh/sshd_config; else sed -i 's/^LogLevel.*/LogLevel INFO/' /etc/ssh/sshd_config;
      fi\n"
    when: audit_5_1_15_0.rc != 0

    # ------------------------------------------------------------
    # 5.1.16 Ensure sshd MACs are configured
    # ------------------------------------------------------------
  - name: "5.1.16 Ensure sshd MACs are configured (Audit)"
    ansible.builtin.shell: |
      sshd -T | grep -Pi -- 'macs\h+([^#\n\r]+,)?(hmac-md5|hmac-md5-96|hmacripemd160|hmac-sha1-96|umac-64@openssh\.com|hmac-md5-etm@openssh\.com|hmacmd5-96-etm@openssh\.com|hmac-ripemd160-etm@openssh\.com|hmac-sha1-96etm@openssh\.com|umac-64-etm@openssh\.com|umac-128-etm@openssh\.com)\b'
    register: audit_5_1_16_0
    changed_when: false
    failed_when: audit_5_1_16_0.stdout | length > 0
    ignore_errors: true
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "5.1.16 Ensure sshd MACs are configured (Remediation)"
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]
    ansible.builtin.shell: "if grep -qi '^MACs' /etc/ssh/sshd_config; then sed -i
      's/^MACs.*/MACs -hmac-md5,hmac-md5-96,hmac-ripemd160,hmac-sha1-96,umac-64@openssh.com,hmac-md5-etm@openssh.com,hmac-md5-96-etm@openssh.com,hmac-ripemd160-etm@openssh.com,hmac-sha1-96-etm@openssh.com,umac-64-etm@openssh.com,umac-128-etm@openssh.com/'
      /etc/ssh/sshd_config; else echo 'MACs -hmac-md5,hmac-md5-96,hmac-ripemd160,hmac-sha1-96,umac-64@openssh.com,hmac-md5-etm@openssh.com,hmac-md5-96-etm@openssh.com,hmac-ripemd160-etm@openssh.com,hmac-sha1-96-etm@openssh.com,umac-64-etm@openssh.com,umac-128-etm@openssh.com'
      >> /etc/ssh/sshd_config; fi\n"
    when: audit_5_1_16_0.rc != 0

    # ------------------------------------------------------------
    # 5.1.17 Ensure sshd MaxAuthTries is configured
    # ------------------------------------------------------------
  - name: "5.1.17 Ensure sshd MaxAuthTries is configured (Audit - Default fallback
      (not Match set statements are used in SSH))"
    ansible.builtin.shell: |
      sshd -T | grep maxauthtries
    register: audit_5_1_17_0
    changed_when: false
    failed_when: audit_5_1_17_0.stdout | length == 0 or (audit_5_1_17_0.stdout.split()
      | last | int > 4)
    ignore_errors: true
    when: not (cis_ssh_match_set_used | default(false) == true)
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "5.1.17 Ensure sshd MaxAuthTries is configured (Audit - Match set statements
      are used in SSH)"
    ansible.builtin.shell: |
      sshd -T -C user=sshuser | grep maxauthtries
    register: audit_5_1_17_1
    changed_when: false
    failed_when: audit_5_1_17_1.stdout | length == 0 or (audit_5_1_17_1.stdout.split()
      | last | int > 4)
    ignore_errors: true
    when: cis_ssh_match_set_used | default(false) == true
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "5.1.17 Ensure sshd MaxAuthTries is configured (Remediation)"
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]
    ansible.builtin.shell: "sed -i 's/^\\s*#\\s*MaxAuthTries.*/MaxAuthTries 4/g' /etc/ssh/sshd_config\n
      if ! grep -qi '^MaxAuthTries ' /etc/ssh/sshd_config; then echo 'MaxAuthTries
      4' >> /etc/ssh/sshd_config; else sed -i 's/^MaxAuthTries.*/MaxAuthTries 4/'
      /etc/ssh/sshd_config; fi\n"
    when: audit_5_1_17_0.rc != 0

    # ------------------------------------------------------------
    # 5.1.18 Ensure sshd MaxSessions is configured
    # ------------------------------------------------------------
  - name: "5.1.18 Ensure sshd MaxSessions is configured (Audit - Default fallback
      (not Match set statements are used in SSH))"
    ansible.builtin.shell: |
      sshd -T | grep maxsessions; grep -Pi '^\s*MaxSessions\s+' /etc/ssh/sshd_config /etc/ssh/sshd_config.d/*.conf 2>/dev/null || true
    register: audit_5_1_18_0
    changed_when: false
    failed_when: audit_5_1_18_0.stdout | length == 0 or (audit_5_1_18_0.stdout.split()
      | last | int > 10)
    ignore_errors: true
    when: not (cis_ssh_match_set_used | default(false) == true)
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "5.1.18 Ensure sshd MaxSessions is configured (Audit - Match set statements
      are used in SSH)"
    ansible.builtin.shell: |
      sshd -T -C user=sshuser | grep maxsessions
    register: audit_5_1_18_1
    changed_when: false
    failed_when: audit_5_1_18_1.stdout | length == 0 or (audit_5_1_18_1.stdout.split()
      | last | int > 10)
    ignore_errors: true
    when: cis_ssh_match_set_used | default(false) == true
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "5.1.18 Ensure sshd MaxSessions is configured (Remediation)"
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]
    ansible.builtin.shell: "sed -i 's/^\\s*#\\s*MaxSessions.*/MaxSessions 10/g' /etc/ssh/sshd_config\n
      if ! grep -qi '^MaxSessions ' /etc/ssh/sshd_config; then echo 'MaxSessions 10'
      >> /etc/ssh/sshd_config; else sed -i 's/^MaxSessions.*/MaxSessions 10/' /etc/ssh/sshd_config;
      fi\n"
    when: audit_5_1_18_0.rc != 0

    # ------------------------------------------------------------
    # 5.1.19 Ensure sshd MaxStartups is configured
    # ------------------------------------------------------------
  - name: "5.1.19 Ensure sshd MaxStartups is configured (Audit)"
    ansible.builtin.shell: |
      sshd -T | awk '$1 ~ /^\s*maxstartups/{split($2, a, ":"); if(a[1] > 10 || a[2] > 30 || a[3] > 60) print $0}'
    register: audit_5_1_19_0
    changed_when: false
    failed_when: audit_5_1_19_0.stdout | length > 0
    ignore_errors: true
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "5.1.19 Ensure sshd MaxStartups is configured (Remediation)"
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]
    ansible.builtin.shell: "sed -i 's/^\\s*#\\s*MaxStartups.*/MaxStartups 10:30:60/g'
      /etc/ssh/sshd_config\nif ! grep -qi '^MaxStartups ' /etc/ssh/sshd_config; then
      echo 'MaxStartups 10:30:60' >> /etc/ssh/sshd_config; else sed -i 's/^MaxStartups.*/MaxStartups
