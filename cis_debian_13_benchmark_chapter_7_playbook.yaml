---
- name: "CIS Debian Linux 13 Benchmark Chapter 7 Playbook"
  hosts: all
  become: true
  gather_facts: true

  vars_files:
    - cis_vars.yaml

  vars:
    host_dest_dir_temp_base: "/tmp/cis_temp_dir"
    host_dest_file_ssh_config: "/etc/ssh/sshd_config"

  pre_tasks:
    - name: "Get current timestamp with millisecond precision"
      ansible.builtin.command: date +%s%3N
      register: timestamp_ms
      changed_when: false

    - name: "Gather package facts"
      ansible.builtin.package_facts:
        manager: auto

    - name: "Set temporary directory variable with timestamp"
      ansible.builtin.set_fact:
        host_dest_dir_temp_cis: "{{ host_dest_dir_temp_base }}_{{ timestamp_ms.stdout }}"

    - name: "Create the temporary directory"
      ansible.builtin.file:
        path: "{{ host_dest_dir_temp_cis }}"
        state: directory
        mode: "0700"
        owner: root
        group: root
      register: temp_dir_creation
      changed_when: temp_dir_creation.changed

  tasks:
    # ------------------------------------------------------------
    # 7.1 Configure system file and directory access
    # ------------------------------------------------------------
    - name: "7.1 Configure system file and directory access (Audit - Manual intervention required)"
      ansible.builtin.debug:
        msg: "Manual audit required"
      tags: ["cis", "manual"]

    - name: "7.1 Configure system file and directory access (Remediation - Manual intervention required)"
      ansible.builtin.debug:
        msg: "Manual remediation required"
      tags: ["cis", "manual"]

    # ------------------------------------------------------------
    # 7.1.1 Ensure access to /etc/passwd is configured
    # ------------------------------------------------------------
    - name: "7.1.1 Ensure access to /etc/passwd is configured (Audit)"
      ansible.builtin.shell: |
        stat -Lc 'Access: (%%#a/%%A) Uid: ( %%u/ %%U) Gid: ( %%g/ %%G)' /etc/passwd
      register: audit_7_1_1_0
      changed_when: false
      failed_when: "not audit_7_1_1_0.stdout | regex_search('Access: \\(0[0246][04][04]/-.*?\\)\\s+Uid: \\( 0/ root\\)\\s+Gid: \\( 0/ root\\)')"
      ignore_errors: true
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    - name: "7.1.1 Ensure access to /etc/passwd is configured (Remediation)"
      ansible.builtin.shell: |
        chmod u-x,go-wx /etc/passwd
        chown root:root /etc/passwd
      register: rem_7_1_1_0
      changed_when: rem_7_1_1_0.rc == 0
      ignore_errors: true
      when: audit_7_1_1_0.rc != 0
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 7.1.2 Ensure access to /etc/passwd- is configured
    # ------------------------------------------------------------
    - name: "7.1.2 Ensure access to /etc/passwd- is configured (Audit)"
      ansible.builtin.shell: |
        stat -Lc 'Access: (%%#a/%%A) Uid: ( %%u/ %%U) Gid: ( %%g/ %%G)' /etc/passwd-
      register: audit_7_1_2_0
      changed_when: false
      failed_when: "not audit_7_1_2_0.stdout | regex_search('Access: \\(0[0246][04][04]/-.*?\\)\\s+Uid: \\( 0/ root\\)\\s+Gid: \\( 0/ root\\)')"
      ignore_errors: true
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    - name: "7.1.2 Ensure access to /etc/passwd- is configured (Remediation)"
      ansible.builtin.shell: |
        chmod u-x,go-wx /etc/passwd-
        chown root:root /etc/passwd-
      register: rem_7_1_2_0
      changed_when: rem_7_1_2_0.rc == 0
      ignore_errors: true
      when: audit_7_1_2_0.rc != 0
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 7.1.3 Ensure access to /etc/group is configured
    # ------------------------------------------------------------
    - name: "7.1.3 Ensure access to /etc/group is configured (Audit)"
      ansible.builtin.shell: |
        stat -Lc 'Access: (%%#a/%%A) Uid: ( %%u/ %%U) Gid: ( %%g/ %%G)' /etc/group
      register: audit_7_1_3_0
      changed_when: false
      failed_when: "not audit_7_1_3_0.stdout | regex_search('Access: \\(0[0246][04][04]/-.*?\\)\\s+Uid: \\( 0/ root\\)\\s+Gid: \\( 0/ root\\)')"
      ignore_errors: true
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    - name: "7.1.3 Ensure access to /etc/group is configured (Remediation)"
      ansible.builtin.shell: |
        chmod u-x,go-wx /etc/group
        chown root:root /etc/group
      register: rem_7_1_3_0
      changed_when: rem_7_1_3_0.rc == 0
      ignore_errors: true
      when: audit_7_1_3_0.rc != 0
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 7.1.4 Ensure access to /etc/group- is configured
    # ------------------------------------------------------------
    - name: "7.1.4 Ensure access to /etc/group- is configured (Audit)"
      ansible.builtin.shell: |
        stat -Lc 'Access: (%%#a/%%A) Uid: ( %%u/ %%U) Gid: ( %%g/ %%G)' /etc/group-
      register: audit_7_1_4_0
      changed_when: false
      failed_when: "not audit_7_1_4_0.stdout | regex_search('Access: \\(0[0246][04][04]/-.*?\\)\\s+Uid: \\( 0/ root\\)\\s+Gid: \\( 0/ root\\)')"
      ignore_errors: true
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    - name: "7.1.4 Ensure access to /etc/group- is configured (Remediation)"
      ansible.builtin.shell: |
        chmod u-x,go-wx /etc/group-
        chown root:root /etc/group-
      register: rem_7_1_4_0
      changed_when: rem_7_1_4_0.rc == 0
      ignore_errors: true
      when: audit_7_1_4_0.rc != 0
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 7.1.5 Ensure access to /etc/shadow is configured
    # ------------------------------------------------------------
    - name: "7.1.5 Ensure access to /etc/shadow is configured (Audit)"
      ansible.builtin.shell: |
        stat -Lc 'Access: (%%#a/%%A) Uid: ( %%u/ %%U) Gid: ( %%g/ %%G)' /etc/shadow
      register: audit_7_1_5_0
      changed_when: false
      failed_when: "not audit_7_1_5_0.stdout | regex_search('Access: \\(0[0246][04]0/-.*?\\)\\s+Uid: \\( 0/ root\\)\\s+Gid: \\( (\\d+/ shadow|0/ root)\\)')"
      ignore_errors: true
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    - name: "7.1.5 Ensure access to /etc/shadow is configured (Remediation)"
      ansible.builtin.shell: |
        chown root:shadow /etc/shadow
        chmod u-x,g-wx,o-rwx /etc/shadow
      register: rem_7_1_5_0
      changed_when: rem_7_1_5_0.rc == 0
      ignore_errors: true
      when: audit_7_1_5_0.rc != 0
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 7.1.6 Ensure access to /etc/shadow- is configured
    # ------------------------------------------------------------
    - name: "7.1.6 Ensure access to /etc/shadow- is configured (Audit)"
      ansible.builtin.shell: |
        stat -Lc 'Access: (%%#a/%%A) Uid: ( %%u/ %%U) Gid: ( %%g/ %%G)' /etc/shadow-
      register: audit_7_1_6_0
      changed_when: false
      failed_when: "not audit_7_1_6_0.stdout | regex_search('Access: \\(0[0246][04]0/-.*?\\)\\s+Uid: \\( 0/ root\\)\\s+Gid: \\( (\\d+/ shadow|0/ root)\\)')"
      ignore_errors: true
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    - name: "7.1.6 Ensure access to /etc/shadow- is configured (Remediation)"
      ansible.builtin.shell: |
        chown root:shadow /etc/shadow-
        chmod u-x,g-wx,o-rwx /etc/shadow-
      register: rem_7_1_6_0
      changed_when: rem_7_1_6_0.rc == 0
      ignore_errors: true
      when: audit_7_1_6_0.rc != 0
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 7.1.7 Ensure access to /etc/gshadow is configured
    # ------------------------------------------------------------
    - name: "7.1.7 Ensure access to /etc/gshadow is configured (Audit)"
      ansible.builtin.shell: |
        stat -Lc 'Access: (%%#a/%%A) Uid: ( %%u/ %%U) Gid: ( %%g/ %%G)' /etc/gshadow
      register: audit_7_1_7_0
      changed_when: false
      failed_when: "not audit_7_1_7_0.stdout | regex_search('Access: \\(0[0246][04]0/-.*?\\)\\s+Uid: \\( 0/ root\\)\\s+Gid: \\( (\\d+/ shadow|0/ root)\\)')"
      ignore_errors: true
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    - name: "7.1.7 Ensure access to /etc/gshadow is configured (Remediation)"
      ansible.builtin.shell: |
        chown root:shadow /etc/gshadow
        chmod u-x,g-wx,o-rwx /etc/gshadow
      register: rem_7_1_7_0
      changed_when: rem_7_1_7_0.rc == 0
      ignore_errors: true
      when: audit_7_1_7_0.rc != 0
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 7.1.8 Ensure access to /etc/gshadow- is configured
    # ------------------------------------------------------------
    - name: "7.1.8 Ensure access to /etc/gshadow- is configured (Audit)"
      ansible.builtin.shell: |
        stat -Lc 'Access: (%%#a/%%A) Uid: ( %%u/ %%U) Gid: ( %%g/ %%G)' /etc/gshadow-
      register: audit_7_1_8_0
      changed_when: false
      failed_when: "not audit_7_1_8_0.stdout | regex_search('Access: \\(0[0246][04]0/-.*?\\)\\s+Uid: \\( 0/ root\\)\\s+Gid: \\( (\\d+/ shadow|0/ root)\\)')"
      ignore_errors: true
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    - name: "7.1.8 Ensure access to /etc/gshadow- is configured (Remediation)"
      ansible.builtin.shell: |
        chown root:shadow /etc/gshadow-
        chmod u-x,g-wx,o-rwx /etc/gshadow-
      register: rem_7_1_8_0
      changed_when: rem_7_1_8_0.rc == 0
      ignore_errors: true
      when: audit_7_1_8_0.rc != 0
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 7.1.9 Ensure access to /etc/shells is configured
    # ------------------------------------------------------------
    - name: "7.1.9 Ensure access to /etc/shells is configured (Audit)"
      ansible.builtin.shell: |
        stat -Lc 'Access: (%%#a/%%A) Uid: ( %%u/ %%U) Gid: ( %%g/ %%G)' /etc/shells
      register: audit_7_1_9_0
      changed_when: false
      failed_when: "not audit_7_1_9_0.stdout | regex_search('Access: \\(0[0246][04][04]/-.*?\\)\\s+Uid: \\( 0/ root\\)\\s+Gid: \\( 0/ root\\)')"
      ignore_errors: true
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    - name: "7.1.9 Ensure access to /etc/shells is configured (Remediation)"
      ansible.builtin.shell: |
        chmod u-x,go-wx /etc/shells
        chown root:root /etc/shells
      register: rem_7_1_9_0
      changed_when: rem_7_1_9_0.rc == 0
      ignore_errors: true
      when: audit_7_1_9_0.rc != 0
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 7.1.13 Ensure SUID and SGID files are reviewed
    # ------------------------------------------------------------
    - name: "7.1.13 Ensure SUID and SGID files are reviewed (Audit)"
      ansible.builtin.shell: |
        #!/usr/bin/env bash
        {
          l_output="" l_output2=""
          a_suid=()
          a_sgid=() # initialize arrays
          while IFS= read -r l_mount; do
            while IFS= read -r -d $'\0' l_file; do
              if [ -e "$l_file" ]; then
                l_mode="$(stat -Lc '%#a' "$l_file")"
                [ $((l_mode & 04000)) -gt 0 ] && a_suid+=("$l_file")
                [ $((l_mode & 02000)) -gt 0 ] && a_sgid+=("$l_file")
              fi
            done < <(
              find "$l_mount" -xdev -type f \( -perm -2000 -o -perm -4000 \)
              -print0 2>/dev/null
            )
          done < <(findmnt -Dkerno fstype,target,options | awk '($1 !~
        /^\s*(nfs|proc|smb|vfat|iso9660|efivarfs|selinuxfs)/ && $2 !~
        /^\/run\/user\// && $3 !~/noexec/ && $3 !~/nosuid/) {print $2}')
          if ! ((${#a_suid[@]} > 0)); then
            l_output="$l_output\n - No executable SUID files exist on the system"
          else
            l_output2="$l_output2\n - List of \"$(printf '%s' "${#a_suid[@]}")"
        SUID executable files:\n$(printf '%s\n' "${a_suid[@]}")\n - end of list -\n"
          fi
          if ! ((${#a_sgid[@]} > 0)); then
            l_output="$l_output\n - No SGID files exist on the system"
          else
            l_output2="$l_output2\n - List of \"$(printf '%s' "${#a_sgid[@]}")"
        SGID executable files:\n$(printf '%s\n' "${a_sgid[@]}")\n - end of list -\n"
          fi
          [ -n "$l_output2" ] && l_output2="$l_output2\n- Review the preceding
        list(s) of SUID and/or SGID files to\n- ensure that no rogue programs have
        been introduced onto the system.\n"
          unset a_arr
          unset a_suid
          unset a_sgid # Remove arrays
          # If l_output2 is empty, Nothing to report
          if [ -z "$l_output2" ]; then
            echo -e "\n- Audit Result:\n$l_output\n"
          else
            echo -e "\n- Audit Result:\n$l_output2\n"
            [ -n "$l_output" ] && echo -e "$l_output\n"
          fi
        }
      register: audit_7_1_13_0
      changed_when: false
      failed_when: "'Review the preceding list' in audit_7_1_13_0.stdout"
      ignore_errors: true
      tags: ["level_1__server", "level_1__workstation", "cis", "manual"]

    - name: "7.1.13 Ensure SUID and SGID files are reviewed (Remediation - Manual intervention required)"
      ansible.builtin.debug:
        msg: "Manual remediation required"
      tags: ["level_1__server", "level_1__workstation", "cis", "manual"]

    # ------------------------------------------------------------
    # 7.2.1 Ensure accounts in /etc/passwd use shadowed passwords
    # ------------------------------------------------------------
    - name: "7.2.1 Ensure accounts in /etc/passwd use shadowed passwords (Audit)"
      ansible.builtin.shell: |
        awk -F: '($2 != "x" ) { print "User: \"" $1 "\" is not set to shadowed passwords "}' /etc/passwd
      register: audit_7_2_1_0
      changed_when: false
      failed_when: audit_7_2_1_0.stdout | length > 0
      ignore_errors: true
      tags: ["level_1__server", "level_1__workstation", "cis", "manual"]

    - name: "7.2.1 Ensure accounts in /etc/passwd use shadowed passwords (Remediation)"
      ansible.builtin.shell: |
        pwconv
      register: rem_7_2_1_0
      changed_when: rem_7_2_1_0.rc == 0
      ignore_errors: true
      when: audit_7_2_1_0.failed
      tags: ["level_1__server", "level_1__workstation", "cis", "manual"]

    # ------------------------------------------------------------
    # 7.2.4 Ensure shadow group is empty
    # ------------------------------------------------------------
    - name: "7.2.4 Ensure shadow group is empty (Audit)"
      ansible.builtin.shell: |
        awk -F: '($1=="shadow") {print $NF}' /etc/group
        awk -F: '($4 == '"$(getent group shadow | awk -F: '{print $3}' | xargs)"') {print " - user: \"" $1 "\" primary group is the shadow group"}' /etc/passwd
      register: audit_7_2_4_0
      changed_when: false
      failed_when: audit_7_2_4_0.stdout_lines | reject('match', '^\\s*$') | list | length > 0
      ignore_errors: true
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    - name: "7.2.4 Ensure shadow group is empty (Remediation - Automated)"
      ansible.builtin.shell: |
        sed -ri 's/(^shadow:[^:]*:[^:]*:)([^:]+$)/\1/' /etc/group
      register: rem_7_2_4_0
      changed_when: rem_7_2_4_0.rc == 0
      ignore_errors: true
      when: audit_7_2_4_0.failed
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    - name: "7.2.4 Ensure shadow group is empty (Remediation - Manual intervention required)"
      ansible.builtin.debug:
        msg: "Manual intervention required to change primary group of users who currently have 'shadow' as their primary group."
      when: audit_7_2_4_0.failed and 'primary group is the shadow group' in audit_7_2_4_0.stdout
      tags: ["level_1__server", "level_1__workstation", "cis", "manual"]

    # ------------------------------------------------------------
    # 7.2.5 Ensure no duplicate UIDs exist
    # ------------------------------------------------------------
    - name: "7.2.5 Ensure no duplicate UIDs exist (Audit)"
      ansible.builtin.shell: |
        #!/usr/bin/env bash
        {
          while read -r l_count l_uid; do
            if [ "$l_count" -gt 1 ]; then
              echo -e "Duplicate UID: \"$l_uid\" Users: \"$(awk -F: '($3 == n) {
        print $1 }' n=$l_uid /etc/passwd | xargs)\""
            fi
          done < <(cut -f3 -d":" /etc/passwd | sort -n | uniq -c)
        }
      register: audit_7_2_5_0
      changed_when: false
      failed_when: audit_7_2_5_0.stdout | length > 0
      ignore_errors: true
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    - name: "7.2.5 Ensure no duplicate UIDs exist (Remediation - Manual intervention required)"
      ansible.builtin.debug:
        msg: "Manual remediation required"
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 7.2.6 Ensure no duplicate GIDs exist
    # ------------------------------------------------------------
    - name: "7.2.6 Ensure no duplicate GIDs exist (Audit)"
      ansible.builtin.shell: |
        #!/usr/bin/env bash
        {
          while read -r l_count l_gid; do
            if [ "$l_count" -gt 1 ]; then
              echo -e "Duplicate GID: \"$l_gid\" Groups: \"$(awk -F: '($3 == n) {
        print $1 }' n=$l_gid /etc/group | xargs)\""
            fi
          done < <(cut -f3 -d":" /etc/group | sort -n | uniq -c)
        }
      register: audit_7_2_6_0
      changed_when: false
      failed_when: audit_7_2_6_0.stdout | length > 0
      ignore_errors: true
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    - name: "7.2.6 Ensure no duplicate GIDs exist (Remediation - Manual intervention required)"
      ansible.builtin.debug:
        msg: "Manual remediation required"
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 7.2.7 Ensure no duplicate user names exist
    # ------------------------------------------------------------
    - name: "7.2.7 Ensure no duplicate user names exist (Audit)"
      ansible.builtin.shell: |
        #!/usr/bin/env bash
        {
          while read -r l_count l_user; do
            if [ "$l_count" -gt 1 ]; then
              echo -e "Duplicate User: \"$l_user\" Users: \"$(awk -F: '($1 == n) {
        print $1 }' n=$l_user /etc/passwd | xargs)\""
            fi
          done < <(cut -f1 -d":" /etc/passwd | sort -n | uniq -c)
        }
      register: audit_7_2_7_0
      changed_when: false
      failed_when: audit_7_2_7_0.stdout | length > 0
      ignore_errors: true
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    - name: "7.2.7 Ensure no duplicate user names exist (Remediation - Manual intervention required)"
      ansible.builtin.debug:
        msg: "Manual remediation required"
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 7.2.8 Ensure no duplicate group names exist
    # ------------------------------------------------------------
    - name: "7.2.8 Ensure no duplicate group names exist (Audit)"
      ansible.builtin.shell: |
        #!/usr/bin/env bash
        {
          while read -r l_count l_group; do
            if [ "$l_count" -gt 1 ]; then
              echo -e "Duplicate Group: \"$l_group\" Groups: \"$(awk -F: '($1 ==
        n) { print $1 }' n=$l_group /etc/group | xargs)\""
            fi
          done < <(cut -f1 -d":" /etc/group | sort -n | uniq -c)
        }
      register: audit_7_2_8_0
      changed_when: false
      failed_when: audit_7_2_8_0.stdout | length > 0
      ignore_errors: true
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    - name: "7.2.8 Ensure no duplicate group names exist (Remediation - Manual intervention required)"
      ansible.builtin.debug:
        msg: "Manual remediation required"
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  post_tasks:
    - name: "Clean up the temporary directory"
      ansible.builtin.file:
        path: "{{ host_dest_dir_temp_cis }}"
        state: absent
      register: temp_cleanup
      changed_when: temp_cleanup.changed

