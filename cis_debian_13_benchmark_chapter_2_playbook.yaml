    # ------------------------------------------------------------
    # 2.3.2 Configure systemd-timesyncd
    # ------------------------------------------------------------
    - name: "2.3.2 Configure systemd-timesyncd (Audit)"
      ansible.builtin.shell: |
        #!/usr/bin/env bash
        {
        a_output=() a_output2=() a_output3=() a_out=() a_out2=() a_parlist=("NTP=[^#\n\r]+"
        "FallbackNTP=[^#\n\r]+")
        l_analyze_cmd="$(readlink -f /bin/systemd-analyze)"
        l_systemd_config_file="/etc/systemd/timesyncd.conf"
        f_config_file_parameter_chk()
        {
        l_used_parameter_setting=""
        while IFS= read -r l_file; do
        l_file="$(tr -d '# ' <<< "$l_file")"
        l_used_parameter_setting="$(grep -PHs -- '^\h*'"$l_parameter_name"'\b' "$l_file" |
        tail -n 1)"
        [ -n "$l_used_parameter_setting" ] && break
        done < <($l_analyze_cmd cat-config "$l_systemd_config_file" | tac | grep -Pio
        '^\h*#\h*\/[^#\n\r\h]+\.conf\b')
        if [ -n "$l_used_parameter_setting" ]; then
        while IFS=: read -r l_file_name l_file_parameter; do
        while IFS="=" read -r l_file_parameter_name l_file_parameter_value; do
        if grep -Pq -- "$l_parameter_value" <<< "$l_file_parameter_value"; then
        a_out+=(" - Parameter: \"${l_file_parameter_name// /}\"" \
        "
        correctly set to: \"${l_file_parameter_value// /}\"" \
        "
        in the file: \"$l_file_name\"")
        else
        a_out2+=(" - Parameter: \"${l_file_parameter_name// /}\"" \
        "
        incorrectly set to: \"${l_file_parameter_value// /}\"" \
        "
        in the file: \"$l_file_name\"" \
        "
        Should be set to: \"$l_value_out\"")
        fi
        done <<< "$l_file_parameter"
        done <<< "$l_used_parameter_setting"
        else
        a_out2+=(" - Parameter: \"$l_parameter_name\" is not set in an included file" \
        "
        *** Note: \"$l_parameter_name\" May be set in a file that's ignored by load
        procedure ***")
        fi
        }
      register: audit_2_3_2_0
      changed_when: false
      failed_when: "'** PASS **' not in audit_2_3_2_0.stdout"
      ignore_errors: true
      tags: ["level_1__server", "level_1__workstation", "cis", "manual"]

    - name: "2.3.2 Configure systemd-timesyncd (Remediation)"
      ansible.builtin.shell: |
        #!/usr/bin/env bash
        {
        a_settings=("NTP=time.nist.gov" "FallbackNTP=time-a-g.nist.gov time-bg.nist.gov time-c-g.nist.gov")
        [ ! -d /etc/systemd/timesyncd.conf.d/ ] && mkdir
        /etc/systemd/timesyncd.conf.d/
        if grep -Psq -- '^\h*\[Time\]' /etc/systemd/timesyncd.conf.d/60timesyncd.conf; then
        printf '%s\n' "" "${a_settings[@]}" >>
        /etc/systemd/timesyncd.conf.d/60-timesyncd.conf
        else
        printf '%s\n' "" "[Time]" "${a_settings[@]}" >>
        /etc/systemd/timesyncd.conf.d/60-timesyncd.conf
        fi
        }
        systemctl reload-or-restart systemd-timesyncd
      register: rem_2_3_2_0
      changed_when: rem_2_3_2_0.rc == 0
      ignore_errors: true
      when: audit_2_3_2_0.rc != 0
      tags: ["level_1__server", "level_1__workstation", "cis", "manual"]

    # ------------------------------------------------------------
    # 2.3.3 Configure chrony
    # ------------------------------------------------------------
    - name: "2.3.3 Configure chrony (Audit - chrony is in use on the system, run the following script to ensure chrony is)"
      ansible.builtin.shell: |
        #!/usr/bin/env bash
        {
          a_output=() a_output2=() a_config_files=("/etc/chrony/chrony.conf")
          l_include='(confdir|sourcedir)' l_parameter_name='(server|pool)'
          l_parameter_value='.+'
          while IFS= read -r l_conf_loc; do
            l_dir="" l_ext=""
            if [ -d "$l_conf_loc" ]; then
              l_dir="$l_conf_loc" l_ext="*"
            elif
              grep -Psq '\/\*\.([^#/\n\r]+)?\h*$' <<<"$l_conf_loc" || [ -f
              "$(readlink -f "$l_conf_loc")" ]
            then
              l_dir="$(dirname "$l_conf_loc")" l_ext="$(basename "$l_conf_loc")"
            fi
            if [[ -n $l_dir && -n $l_ext ]]; then
              while IFS= read -r -d $'\0' l_file_name; do
                [ -f "$(readlink -f "$l_file_name")" ] &&
                  a_config_files+=("$(readlink -f "$l_file_name")")
              done < <(
                find -L "$l_dir" -type f -name "$l_ext" -print0
                2>/dev/null
              )
            fi
          done < <(
            awk '$1~/^\s*'"$l_include"'$/{print $2}' "${a_config_files[*]}"
            2>/dev/null
          )
          for l_file in "${a_config_files[@]}"; do
            l_parameter_line="$(
              grep -Psi
              '^\h*'"$l_parameter_name"'(\h+|\h*:\h*)'"$l_parameter_value"'\b' "$l_file"
            )"
            [ -n "$l_parameter_line" ] && a_output+=(" - Parameter: \"$(
              tr -d '()'
              <<<${l_parameter_name//|/ or }
            )\""
            "
        Exists in the file: \"$l_file\" as:" "$l_parameter_line")
          done
          [ "${#a_output[@]}" -le "0" ] && a_output2+=(" - Parameter: \"$(
            tr -d
            '()' <<<${l_parameter_name//|/ or }
          )\""
          "
        Does not exist in the chrony configuration")
          if [ "${#a_output2[@]}" -le 0 ]; then
            printf '%s\n' "" "- Audit Result:" " ** PASS **" "${a_output[@]}" ""
          else
            printf '%s\n' "" "- Audit Result:" " ** FAIL **" " - Reason(s) for
        audit failure:" "${a_output2[@]}"
          fi
        }
      register: audit_2_3_3_0
      changed_when: false
      failed_when: "'** PASS **' not in audit_2_3_3_0.stdout"
      ignore_errors: true
      when: cis_condition_chrony_is_in_use_on_the_system__run_the_following_ | default(false)
      tags: ["level_1__server", "level_1__workstation", "cis", "manual"]

    - name: "2.3.3 Configure chrony (Remediation)"
      ansible.builtin.shell: |
        #!/usr/bin/env bash
        {
          [ ! -d "/etc/chrony/sources.d/" ] && mkdir /etc/chrony/sources.d/
          printf '%s\n' "" "#The maxsources option is unique to the pool directive" \
          "pool time.nist.gov iburst maxsources 4" >>/etc/chrony/sources.d/60sources.sources
          chronyc reload sources &>/dev/null
        }
        #!/usr/bin/env bash
        {
          [ ! -d "/etc/chrony/sources.d/" ] && mkdir /etc/chrony/sources.d/
          printf '%s\n' "" "server time-a-g.nist.gov iburst" "server 132.163.97.3
        iburst" \
            "server time-d-b.nist.gov iburst" >>/etc/chrony/sources.d/60sources.sources
          chronyc reload sources &>/dev/null
        }
        systemctl reload-or-restart chronyd
      register: rem_2_3_3_0
      changed_when: rem_2_3_3_0.rc == 0
      ignore_errors: true
