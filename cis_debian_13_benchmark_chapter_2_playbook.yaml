---
- name: "CIS Debian Linux 13 Benchmark Chapter 2 Playbook"
  hosts: all
  become: true
  gather_facts: true

  vars_files:
    - cis_vars.yaml

  vars:
    host_dest_dir_temp_base: "/tmp/cis_temp_dir"
    host_dest_file_ssh_config: "/etc/ssh/sshd_config"

  pre_tasks:
    - name: "Get current timestamp with millisecond precision"
      ansible.builtin.command: date +%s%3N
      register: timestamp_ms
      changed_when: false

    - name: "Gather package facts"
      ansible.builtin.package_facts:
        manager: auto

    - name: "Set temporary directory variable with timestamp"
      ansible.builtin.set_fact:
        host_dest_dir_temp_cis: "{{ host_dest_dir_temp_base }}_{{ timestamp_ms.stdout }}"

    - name: "Create the temporary directory"
      ansible.builtin.file:
        path: "{{ host_dest_dir_temp_cis }}"
        state: directory
        mode: "0700"
        owner: root
        group: root
      register: temp_dir_creation
      changed_when: temp_dir_creation.changed

  tasks:
    # ------------------------------------------------------------
    # 2.1 Configure Server Services
    # ------------------------------------------------------------
    - name: "2.1 Configure Server Services (Audit - Manual intervention required)"
      ansible.builtin.debug:
        msg: "Manual audit required"
      tags: ["cis", "manual"]

    - name: "2.1 Configure Server Services (Remediation - Manual intervention required)"
      ansible.builtin.debug:
        msg: "Manual remediation required"
      tags: ["cis", "manual"]

    # ------------------------------------------------------------
    # 2.1.1 Ensure autofs services are not in use
    # ------------------------------------------------------------
    - name: "2.1.1 Ensure autofs services are not in use (Audit - Default fallback (not autofs is required as dependency))"
      ansible.builtin.shell: |
        dpkg-query -s autofs &>/dev/null && echo "autofs is installed"
      register: audit_2_1_1_0
      changed_when: false
      failed_when: audit_2_1_1_0.stdout | length > 0
      ignore_errors: true
      when: not (cis_autofs_required | default(false))
      tags: ["level_1__server", "level_2__workstation", "cis", "automated"]

    - name: "2.1.1 Ensure autofs services are not in use (Audit - autofs is required as dependency)"
      ansible.builtin.shell: |
        systemctl is-enabled autofs.service 2>/dev/null | grep 'enabled'
        systemctl is-active autofs.service 2>/dev/null | grep '^active'
      register: audit_2_1_1_1
      changed_when: false
      failed_when: audit_2_1_1_1.stdout | length > 0
      ignore_errors: true
      when: cis_autofs_required | default(false)
      tags: ["level_1__server", "level_2__workstation", "cis", "automated"]

    - name: "2.1.1 Ensure autofs services are not in use (Remediation - Default fallback (not autofs is required as dependency))"
      ansible.builtin.shell: |
        systemctl stop autofs.service
        apt-get purge -y autofs
      register: rem_2_1_1_0
      changed_when: rem_2_1_1_0.rc == 0
      ignore_errors: true
      when:
        - audit_2_1_1_0.rc != 0
        - not (cis_autofs_required | default(false))
      tags: ["level_1__server", "level_2__workstation", "cis", "automated"]

    - name: "2.1.1 Ensure autofs services are not in use (Remediation - autofs is required as dependency)"
      ansible.builtin.shell: |
        systemctl stop autofs.service
        systemctl mask autofs.service
      register: rem_2_1_1_1
      changed_when: rem_2_1_1_1.rc == 0
      ignore_errors: true
      when:
        - audit_2_1_1_1.rc != 0
        - cis_autofs_required | default(false)
      tags: ["level_1__server", "level_2__workstation", "cis", "automated"]

