      tags: ["cis", "manual"]

    # ------------------------------------------------------------
    # 3.3.1.1 Ensure net.ipv4.ip_forward is configured
    # ------------------------------------------------------------
    - name: "3.3.1.1 Ensure net.ipv4.ip_forward is configured (Audit)"
      ansible.builtin.shell: |
        #!/usr/bin/env bash
        sysctl net.ipv4.ip_forward
        {
          l_parameter_name="net.ipv4.ip_forward"
          l_grep="${l_parameter_name//./(\\.|\\/)}" a_output=() a_files=()
          l_systemdsysctl="$(readlink -e /lib/systemd/systemd-sysctl ||
            readlink -e /usr/lib/systemd/systemd-sysctl)"
          l_ufw_file="$([ -f /etc/default/ufw ] &&
            awk -F= '/^\s*IPT_SYSCTL=/ {print $2}' /etc/default/ufw)"
          [ -f "$(readlink -e "$l_ufw_file")" ] &&
            a_files+=("$l_ufw_file")
          a_files+=("/etc/sysctl.conf")
          while IFS= read -r l_fname; do
            l_file="$(readlink -e "${l_fname//# /}")"
            [ -n "$l_file" ] && ! grep -Psiq -- '(^|\h+)'"$l_file"'\b' \
              <<<"${a_files[*]}" && a_files+=("$l_file")
          done < <("$l_systemdsysctl" --cat-config | tac |
            grep -Psio -- '^\h*#\h*\/[^#\n\r\h]+\.conf\b')
          for l_file in "${a_files[@]}"; do
            l_opt="$(
              grep -Psio '^\h*'"$l_grep"'\h*=\h*\H+\b' "$l_file" | tail -n
              1
            )"
            l_option_value="$(cut -d= -f2 <<<"$l_opt" | xargs)"
            [ -n "$l_option_value" ] &&
              a_output+=(" - \"$l_parameter_name = $l_option_value\" is set in:
        \"$l_file\"")
          done
          [ "${#a_output[@]}" -gt "0" ] && printf '%s\n' "" "${a_output[@]}" ""
        }
      register: audit_3_3_1_1_0
      changed_when: false
      failed_when: >-
        not (audit_3_3_1_1_0.stdout | regex_search('(?m)^net\\.ipv4\\.ip_forward\\s*=\\s*0')) or '\"net.ipv4.ip_forward = 0\" is set in:' not in audit_3_3_1_1_0.stdout
      ignore_errors: true
      when: not (docker_is_used | default(false))
      tags: ["level_1__workstation", "level_2__server", "cis", "automated"]

    - name: "3.3.1.1 Ensure net.ipv4.ip_forward is configured (Remediation)"
      ansible.builtin.shell: |
        #!/usr/bin/env bash
        {
          l_option="net.ipv4.ip_forward" l_value="0"
          l_grep="${l_option//./(\\.|\\/)}" a_files=()
          l_systemdsysctl="$(readlink -e /lib/systemd/systemd-sysctl ||
            readlink -e /usr/lib/systemd/systemd-sysctl)"
          l_ufw_file="$([ -f /etc/default/ufw ] &&
            awk -F= '/^\s*IPT_SYSCTL=/ {print $2}' /etc/default/ufw)"
          [ -f "$(readlink -e "$l_ufw_file")" ] &&
            a_files+=("$l_ufw_file")
          a_files+=("/etc/sysctl.conf")
          while IFS= read -r l_fname; do
            l_file="$(readlink -e "${l_fname//# /}")"
            [ -n "$l_file" ] && ! grep -Psiq -- '(^|\h+)'"$l_file"'\b' \
              <<<"${a_files[*]}" && a_files+=("$l_file")
          done < <("$l_systemdsysctl" --cat-config | tac |
            grep -Psio -- '^\h*#\h*\/[^#\n\r\h]+\.conf\b')
          for l_file in "${a_files[@]}"; do
            grep -Psio -- '\h*'"$l_grep"'\h*=\h*\H+\b' "$l_file" |
              grep -Psivq -- '^\h*'"$l_grep"'\h*=\h*'"$l_value"'\b' &&
              sed -ri '/^\s*'"$l_grep"'\s*=\s*(1[0-9]*)/s/^/# /' "$l_file"
          done
        }
        [ ! -d "/etc/sysctl.d/" ] && mkdir -p /etc/sysctl.d/
        printf '%s\n' "" "net.ipv4.ip_forward = 0" >>/etc/sysctl.d/60ipv4_sysctl.conf
        sysctl --system
      register: rem_3_3_1_1_0
      changed_when: rem_3_3_1_1_0.rc == 0
      ignore_errors: true
      when:
        - not (docker_is_used | default(false))
        - audit_3_3_1_1_0.rc is defined
        - audit_3_3_1_1_0.rc != 0
      tags: ["level_1__workstation", "level_2__server", "cis", "automated"]

