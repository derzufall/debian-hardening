---
- name: "CIS Debian Linux 13 Benchmark Chapter 3 Playbook"
  hosts: all
  become: true
  gather_facts: true

  vars_files:
    - cis_vars.yaml

  vars:
    host_dest_dir_temp_base: "/tmp/cis_temp_dir"
    host_dest_file_ssh_config: "/etc/ssh/sshd_config"

  pre_tasks:
    - name: "Get current timestamp with millisecond precision"
      ansible.builtin.command: date +%s%3N
      register: timestamp_ms
      changed_when: false

    - name: "Gather package facts"
      ansible.builtin.package_facts:
        manager: auto

    - name: "Set temporary directory variable with timestamp"
      ansible.builtin.set_fact:
        host_dest_dir_temp_cis: "{{ host_dest_dir_temp_base }}_{{ timestamp_ms.stdout }}"

    - name: "Create the temporary directory"
      ansible.builtin.file:
        path: "{{ host_dest_dir_temp_cis }}"
        state: directory
        mode: "0700"
        owner: root
        group: root
      register: temp_dir_creation
      changed_when: temp_dir_creation.changed

  tasks:
    # ------------------------------------------------------------
    # 3.1 Configure Network Devices
    # ------------------------------------------------------------
    - name: "3.1 Configure Network Devices (Audit - Manual intervention required)"
      ansible.builtin.debug:
        msg: "Manual audit required"
      tags: ["cis", "manual"]

    - name: "3.1 Configure Network Devices (Remediation - Manual intervention required)"
      ansible.builtin.debug:
        msg: "Manual remediation required"
      tags: ["cis", "manual"]

    # ------------------------------------------------------------
    # 3.1.1 Ensure IPv6 status is identified
    # ------------------------------------------------------------
    - name: "3.1.1 Ensure IPv6 status is identified (Audit)"
      ansible.builtin.shell: |
        #!/usr/bin/env bash
        {
          l_output=""
          ! grep -Pqs -- '^\h*0\b' /sys/module/ipv6/parameters/disable &&
            l_output="- IPv6 is not enabled"
          if sysctl net.ipv6.conf.all.disable_ipv6 | grep -Pqs -"^\h*net\.ipv6\.conf\.all\.disable_ipv6\h*=\h*1\b" &&
            sysctl net.ipv6.conf.default.disable_ipv6 | grep -Pqs -"^\h*net\.ipv6\.conf\.default\.disable_ipv6\h*=\h*1\b"; then
            l_output="- IPv6 is not enabled"
          fi
          [ -z "$l_output" ] && l_output="- IPv6 is enabled"
          echo -e "\n$l_output\n"
        }
      register: audit_3_1_1_0
      changed_when: false
      failed_when: false
      ignore_errors: true
      tags: ["level_1__server", "level_1__workstation", "cis", "manual"]

    - name: "3.1.1 Ensure IPv6 status is identified (Remediation - Manual intervention required)"
      ansible.builtin.debug:
        msg: "Manual remediation required"
      tags: ["level_1__server", "level_1__workstation", "cis", "manual"]

    # ------------------------------------------------------------
    # 3.1.2 Ensure wireless interfaces are not available
    # ------------------------------------------------------------
    - name: "3.1.2 Ensure wireless interfaces are not available (Audit)"
      ansible.builtin.shell: |
        #!/usr/bin/env bash
        {
        l_output="" l_output2=""
        module_chk()
        {
          # Check how module will be loaded
          l_loadable="$(modprobe -n -v "$l_mname")"
          if grep -Pq -- '^\h*install \/bin\/(true|false)' <<< "$l_loadable"; then
            l_output="$l_output\n - module: \"$l_mname\" is not loadable: \"$l_loadable\""
          else
            l_output2="$l_output2\n - module: \"$l_mname\" is loadable: \"$l_loadable\""
          fi
          # Check is the module currently loaded
          if ! lsmod | grep "$l_mname" > /dev/null 2>&1; then
            l_output="$l_output\n - module: \"$l_mname\" is not loaded"
          else
            l_output2="$l_output2\n - module: \"$l_mname\" is loaded"
          fi
          # Check if the module is deny listed
          if modprobe --showconfig | grep -Pq -- "^\h*blacklist\h+$l_mname\b"; then
            l_output="$l_output\n - module: \"$l_mname\" is deny listed in: \"$(grep -Pl -- "^\h*blacklist\h+$l_mname\b" /etc/modprobe.d/*)\""
          else
            l_output2="$l_output2\n - module: \"$l_mname\" is not deny listed"
          fi
        }
        if [ -n "$(find /sys/class/net/*/ -type d -name wireless 2>/dev/null)" ]; then
          l_dname=$(for driverdir in $(find /sys/class/net/*/ -type d -name wireless | xargs -0 dirname); do basename "$(readlink -f "$driverdir"/device/driver/module)";done | sort -u)
          for l_mname in $l_dname; do
            module_chk
          done
        fi
        # Report results. If no failures output in l_output2, we pass
        if [ -z "$l_output2" ]; then
          echo -e "\n- Audit Result:\n ** PASS **"
          if [ -z "$l_output" ]; then
            echo -e "\n - System has no wireless NICs installed"
          else
            echo -e "\n$l_output\n"
          fi
        else
          echo -e "\n- Audit Result:\n ** FAIL **\n - Reason(s) for audit failure:\n$l_output2\n"
          [ -n "$l_output" ] && echo -e "\n- Correctly set:\n$l_output\n"
        fi
        }
      register: audit_3_1_2_0
      changed_when: false
      failed_when: >-
        '** FAIL **' in audit_3_1_2_0.stdout
      ignore_errors: true
      tags: ["level_1__server", "cis", "automated"]

    - name: "3.1.2 Ensure wireless interfaces are not available (Remediation)"
      ansible.builtin.shell: |
        find /lib/modules/`uname -r`/kernel/drivers/net/wireless -name '*.ko' -printf 'install %f /bin/false\nblacklist %f\n\n' | sed 's/\.ko//1' >> /etc/modprobe.d/blacklist-wireless.conf
      register: rem_3_1_2_0
      changed_when: rem_3_1_2_0.rc == 0
      ignore_errors: true
      when: audit_3_1_2_0.rc != 0
      tags: ["level_1__server", "cis", "automated"]

    # ------------------------------------------------------------
    # 3.1.3 Ensure bluetooth services are not in use
    # ------------------------------------------------------------
    - name: "3.1.3 Ensure bluetooth services are not in use (Audit - Default fallback (not bluez is required as dependency))"
      ansible.builtin.shell: |
        dpkg-query -s bluez &>/dev/null && echo "bluez is installed"
      register: audit_3_1_3_0
      changed_when: false
      failed_when: >-
        audit_3_1_3_0.stdout | length > 0
      ignore_errors: true
      when: not (cis_bluez_required | default(false))
      tags: ["level_1__server", "level_2__workstation", "cis", "automated"]

    - name: "3.1.3 Ensure bluetooth services are not in use (Audit - bluez is required as dependency)"
      ansible.builtin.shell: |
        systemctl is-enabled bluetooth.service 2>/dev/null | grep 'enabled'
        systemctl is-active bluetooth.service 2>/dev/null | grep '^active'
      register: audit_3_1_3_1
      changed_when: false
      failed_when: >-
        audit_3_1_3_1.stdout | length > 0
      ignore_errors: true
      when: cis_bluez_required | default(false)
      tags: ["level_1__server", "level_2__workstation", "cis", "automated"]

    - name: "3.1.3 Ensure bluetooth services are not in use (Remediation - Default fallback (not bluez is required as dependency))"
      ansible.builtin.shell: |
        systemctl stop bluetooth.service
        DEBIAN_FRONTEND=noninteractive apt-get purge -y bluez
      register: rem_3_1_3_0
      changed_when: rem_3_1_3_0.rc == 0
      ignore_errors: true
      when:
        - audit_3_1_3_0.rc != 0
        - not (cis_bluez_required | default(false))
      tags: ["level_1__server", "level_2__workstation", "cis", "automated"]

    - name: "3.1.3 Ensure bluetooth services are not in use (Remediation - bluez is required as dependency)"
      ansible.builtin.shell: |
        systemctl stop bluetooth.service
        systemctl mask bluetooth.service
      register: rem_3_1_3_1
      changed_when: rem_3_1_3_1.rc == 0
      ignore_errors: true
      when:
        - audit_3_1_3_1.rc != 0
        - cis_bluez_required | default(false)
      tags: ["level_1__server", "level_2__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 3.2 Configure Network Kernel Modules
    # ------------------------------------------------------------
