    # ------------------------------------------------------------
    # 3.2.1 Ensure atm kernel module is not available
    # ------------------------------------------------------------
    - name: "3.2.1 Ensure atm kernel module is not available (Audit)"
      ansible.builtin.shell: |
        #!/usr/bin/env bash
        {
          l_mod_name="atm" l_mod_type="net"
          while IFS= read -r l_mod_path; do
            if [ -d "$l_mod_path/${l_mod_name//-/\/}" ] &&
              [ -n "$(ls -A "$l_mod_path/${l_mod_name//-/\/}")" ]; then
              printf '%s\n' "$l_mod_name exists in $l_mod_path"
            fi
          done < <(readlink -e /usr/lib/modules/**/kernel/$l_mod_type ||
            readlink -e /lib/modules/**/kernel/$l_mod_type)
        }
        lsmod | grep 'atm'
        modprobe --showconfig | grep -P -- '\b(install|blacklist)\h+atm\b'
      register: audit_3_2_1_0
      changed_when: false
      failed_when: >-
        audit_3_2_1_0.stdout | length > 0 and not ('blacklist atm' in audit_3_2_1_0.stdout and ('install atm /bin/false' in audit_3_2_1_0.stdout or 'install atm /bin/true' in audit_3_2_1_0.stdout) and not (audit_3_2_1_0.stdout | regex_search('(?m)^atm\\s+\\d+')))
      ignore_errors: true
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    - name: "3.2.1 Ensure atm kernel module is not available (Remediation)"
      ansible.builtin.shell: |
        modprobe -r atm 2>/dev/null
        rmmod atm 2>/dev/null
        printf '\n%s\n' "install atm /bin/false" >>/etc/modprobe.d/60-atm.conf
        printf '\n%s\n' "blacklist atm" >>/etc/modprobe.d/60-atm.conf
      register: rem_3_2_1_0
      changed_when: rem_3_2_1_0.rc == 0
      ignore_errors: true
      when: audit_3_2_1_0.rc != 0
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

