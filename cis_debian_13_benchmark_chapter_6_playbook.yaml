    # ------------------------------------------------------------
    - name: "6.1.3.1 Ensure access to all logfiles has been configured (Audit)"
      ansible.builtin.shell: |-
        find /var/log -type f -exec stat -Lc '%n %a %U %G' {} + | awk '$2 > 640 || $3 != "root" || $4 != "root" { print $1 }'
      register: audit_6_1_3_1_0
      changed_when: false
      failed_when: audit_6_1_3_1_0.stdout | length > 0
      ignore_errors: true
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    - name: "6.1.3.1 Ensure access to all logfiles has been configured (Remediation)"
      ansible.builtin.shell: |-
        find /var/log -type f -exec chmod g-wx,o-rwx {} + 2>/dev/null || true
        find /var/log -type f -exec chown root:root {} + 2>/dev/null || true
      register: rem_6_1_3_1_0
      changed_when: rem_6_1_3_1_0.rc == 0
      ignore_errors: true
      when: audit_6_1_3_1_0.stdout | length > 0
