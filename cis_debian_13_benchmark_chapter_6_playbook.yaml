    # ------------------------------------------------------------
    # 6.2.4.1 Ensure audit log files mode is configured
    # ------------------------------------------------------------
    - name: "6.2.4.1 Ensure audit log files mode is configured (Audit)"
      ansible.builtin.shell:
        cmd: |
          #!/usr/bin/env bash
          {
            l_perm_mask="0137"
            if [ -e "/etc/audit/auditd.conf" ]; then
              l_audit_log_directory="$(dirname "$(awk -F= '/^\s*log_file\s*/{print $2}' /etc/audit/auditd.conf | xargs)")"
              if [ -d "$l_audit_log_directory" ]; then
                l_maxperm="$(printf '%o' $((0777 & ~$l_perm_mask)))"
                a_files=()
                while IFS= read -r -d $'\0' l_file; do
                  [ -e "$l_file" ] && a_files+=("$l_file")
                done < <(find "$l_audit_log_directory" -maxdepth 1 -type f -perm /"$l_perm_mask" -print0)
                if (("${#a_files[@]}" > 0)); then
                  for l_file in "${a_files[@]}"; do
                    l_file_mode="$(stat -Lc '%#a' "$l_file")"
                    echo -e "\n- Audit Result:\n ** FAIL **\n - File: \"$l_file\" is mode: \"$l_file_mode\"\n (should be mode: \"$l_maxperm\" or more restrictive)\n"
                  done
                else
                  echo -e "\n- Audit Result:\n ** PASS **\n - All files in \"$l_audit_log_directory\" are mode: \"$l_maxperm\" or more restrictive"
                fi
              else
                echo -e "\n- Audit Result:\n ** FAIL **\n - Log file directory not set in \"/etc/audit/auditd.conf\" please set log file directory"
              fi
            else
              echo -e "\n- Audit Result:\n ** FAIL **\n - File: \"/etc/audit/auditd.conf\" not found.\n - ** Verify auditd is installed **"
            fi
          }
      register: audit_6_2_4_1_0
      changed_when: false
      failed_when: "'** PASS **' not in audit_6_2_4_1_0.stdout"
      ignore_errors: true
      tags: ["level_2__server", "level_2__workstation", "cis", "automated"]

    - name: "6.2.4.1 Ensure audit log files mode is configured (Remediation)"
      ansible.builtin.shell: |
        [ -f /etc/audit/auditd.conf ] && find "$(dirname $(awk -F "=" '/^\s*log_file/ {print $2}' /etc/audit/auditd.conf | xargs))" -type f -perm /0137 -exec chmod u-x,g-wx,o-rwx {} +
      register: rem_6_2_4_1_0
      changed_when: rem_6_2_4_1_0.rc == 0
      ignore_errors: true
      when: audit_6_2_4_1_0.rc != 0
      tags: ["level_2__server", "level_2__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 6.2.4.2 Ensure audit log files owner is configured
    # ------------------------------------------------------------
    - name: "6.2.4.2 Ensure audit log files owner is configured (Audit)"
      ansible.builtin.shell:
        cmd: |
          #!/usr/bin/env bash
          {
            l_output="" l_output2=""
            if [ -e "/etc/audit/auditd.conf" ]; then
              l_audit_log_directory="$(dirname "$(awk -F= '/^\s*log_file\s*/{print $2}' /etc/audit/auditd.conf | xargs)")"
              if [ -d "$l_audit_log_directory" ]; then
                while IFS= read -r -d $'\0' l_file; do
                  l_output2="$l_output2\n - File: \"$l_file\" is owned by user: \"$(stat -Lc '%U' "$l_file")\"\n (should be owned by user: \"root\")\n"
                done < <(find "$l_audit_log_directory" -maxdepth 1 -type f ! -user root -print0)
              else
                l_output2="$l_output2\n - Log file directory not set in \"/etc/audit/auditd.conf\" please set log file directory"
              fi
            else
              l_output2="$l_output2\n - File: \"/etc/audit/auditd.conf\" not found.\n - ** Verify auditd is installed **"
            fi
            if [ -z "$l_output2" ]; then
              l_output="$l_output\n - All files in \"$l_audit_log_directory\" are owned by user: \"root\"\n"
              echo -e "\n- Audit Result:\n ** PASS **\n - * Correctly configured * :$l_output"
            else
              echo -e "\n- Audit Result:\n ** FAIL **\n - * Reasons for audit failure * :$l_output2\n"
            fi
          }
      register: audit_6_2_4_2_0
      changed_when: false
      failed_when: "'** PASS **' not in audit_6_2_4_2_0.stdout"
      ignore_errors: true
      tags: ["level_2__server", "level_2__workstation", "cis", "automated"]

    - name: "6.2.4.2 Ensure audit log files owner is configured (Remediation)"
      ansible.builtin.shell: |
        [ -f /etc/audit/auditd.conf ] && find "$(dirname $(awk -F "=" '/^\s*log_file/ {print $2}' /etc/audit/auditd.conf | xargs))" -type f ! -user root -exec chown root {} +
      register: rem_6_2_4_2_0
      changed_when: rem_6_2_4_2_0.rc == 0
      ignore_errors: true
      when: audit_6_2_4_2_0.rc != 0
      tags: ["level_2__server", "level_2__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 6.2.4.8 Ensure audit tools mode is configured
    # ------------------------------------------------------------
    - name: "6.2.4.8 Ensure audit tools mode is configured (Audit)"
      ansible.builtin.shell:
        cmd: |
          #!/usr/bin/env bash
          {
            l_output="" l_output2="" l_perm_mask="0022"
            l_maxperm="$(printf '%o' $((0777 & ~$l_perm_mask)))"
            a_audit_tools=("/sbin/auditctl" "/sbin/aureport" "/sbin/ausearch" "/sbin/auditd" "/sbin/augenrules")
            for l_audit_tool in "${a_audit_tools[@]}"; do
              l_mode="$(stat -Lc '%#a' "$l_audit_tool")"
              if [ $(("$l_mode" & "$l_perm_mask")) -gt 0 ]; then
                l_output2="$l_output2\n - Audit tool \"$l_audit_tool\" is mode: \"$l_mode\" and should be mode: \"$l_maxperm\" or more restrictive"
              else
                l_output="$l_output\n - Audit tool \"$l_audit_tool\" is correctly configured to mode: \"$l_mode\""
              fi
            done
            if [ -z "$l_output2" ]; then
              echo -e "\n- Audit Result:\n ** PASS **\n - * Correctly configured * :$l_output"
            else
              echo -e "\n- Audit Result:\n ** FAIL **\n - * Reasons for audit failure * :$l_output2\n"
              [ -n "$l_output" ] && echo -e "\n - * Correctly configured * :\n$l_output\n"
            fi
            unset a_audit_tools
          }
      register: audit_6_2_4_8_0
      changed_when: false
      failed_when: "'** PASS **' not in audit_6_2_4_8_0.stdout"
      ignore_errors: true
      tags: ["level_2__server", "level_2__workstation", "cis", "automated"]

    - name: "6.2.4.8 Ensure audit tools mode is configured (Remediation)"
      ansible.builtin.shell: |
        chmod go-w /sbin/auditctl /sbin/aureport /sbin/ausearch /sbin/auditd /sbin/augenrules
      register: rem_6_2_4_8_0
      changed_when: rem_6_2_4_8_0.rc == 0
      ignore_errors: true
      when: audit_6_2_4_8_0.rc != 0
      tags: ["level_2__server", "level_2__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 6.2.4.9 Ensure audit tools owner is configured
    # ------------------------------------------------------------
    - name: "6.2.4.9 Ensure audit tools owner is configured (Audit)"
      ansible.builtin.shell: |
        stat -Lc "%n %U" /sbin/auditctl /sbin/aureport /sbin/ausearch /sbin/auditd /sbin/augenrules | awk '$2 != "root" {print}'
      register: audit_6_2_4_9_0
      changed_when: false
      failed_when: "audit_6_2_4_9_0.stdout | length > 0"
      ignore_errors: true
      tags: ["level_2__server", "level_2__workstation", "cis", "automated"]

    - name: "6.2.4.9 Ensure audit tools owner is configured (Remediation)"
      ansible.builtin.shell: |
        chown root /sbin/auditctl /sbin/aureport /sbin/ausearch /sbin/auditd /sbin/augenrules
      register: rem_6_2_4_9_0
      changed_when: rem_6_2_4_9_0.rc == 0
      ignore_errors: true
      when: audit_6_2_4_9_0.rc != 0
      tags: ["level_2__server", "level_2__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 6.3 Configure Integrity Checking
    # ------------------------------------------------------------
    - name: "6.3 Configure Integrity Checking (Audit - Manual intervention required)"
      ansible.builtin.debug:
        msg: "Manual audit required"
      tags: ["cis", "manual"]

    - name: "6.3 Configure Integrity Checking (Remediation - Manual intervention required)"
      ansible.builtin.debug:
        msg: "Manual remediation required"
      tags: ["cis", "manual"]

    # ------------------------------------------------------------
    # 6.3.1 Ensure AIDE is installed
    # ------------------------------------------------------------
    - name: "6.3.1 Ensure AIDE is installed (Audit)"
      ansible.builtin.shell: |
        dpkg-query -s aide &>/dev/null && echo "aide is installed"
        dpkg-query -s aide-common &>/dev/null && echo "aide-common is installed"
      register: audit_6_3_1_0
      changed_when: false
      failed_when: "'aide is installed' not in audit_6_3_1_0.stdout or 'aide-common is installed' not in audit_6_3_1_0.stdout"
      ignore_errors: true
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    - name: "6.3.1 Ensure AIDE is installed (Remediation)"
      ansible.builtin.shell: |
        apt-get install -y aide aide-common
        aideinit
        mv /var/lib/aide/aide.db.new /var/lib/aide/aide.db
      register: rem_6_3_1_0
      changed_when: rem_6_3_1_0.rc == 0
      ignore_errors: true
      when: audit_6_3_1_0.rc != 0
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 6.3.2 Ensure filesystem integrity is regularly checked
    # ------------------------------------------------------------
    - name: "6.3.2 Ensure filesystem integrity is regularly checked (Audit)"
      ansible.builtin.shell: |
        systemctl list-unit-files | awk '$1~/^dailyaidecheck\.(timer|service)$/{print $1 "\t" $2}'
        systemctl is-active dailyaidecheck.timer
      register: audit_6_3_2_0
      changed_when: false
      failed_when: "'active' not in audit_6_3_2_0.stdout"
      ignore_errors: true
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    - name: "6.3.2 Ensure filesystem integrity is regularly checked (Remediation)"
      ansible.builtin.shell: |
        systemctl unmask dailyaidecheck.timer dailyaidecheck.service
        systemctl --now enable dailyaidecheck.timer
      register: rem_6_3_2_0
      changed_when: rem_6_3_2_0.rc == 0
      ignore_errors: true
      when: audit_6_3_2_0.rc != 0
      tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  post_tasks:
    - name: "Clean up the temporary directory"
      ansible.builtin.file:
        path: "{{ host_dest_dir_temp_cis }}"
        state: absent
      register: temp_cleanup
      changed_when: temp_cleanup.changed

