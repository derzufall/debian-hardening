    ignore_errors: true
    when: audit_1_1_1_8_0.rc != 0
    tags: ["level_2__server", "level_2__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 1.1.2 Configure Filesystem Partitions
    # ------------------------------------------------------------
  - name: "1.1.2 Configure Filesystem Partitions (Audit - Manual intervention required)"
    ansible.builtin.debug:
      msg: "Manual audit required"
    tags: ["cis", "manual"]

  - name: "1.1.2 Configure Filesystem Partitions (Remediation - Manual intervention
      required)"
    ansible.builtin.debug:
      msg: "Manual remediation required"
    tags: ["cis", "manual"]

    # ------------------------------------------------------------
    # 1.1.2.1 Configure /tmp
    # ------------------------------------------------------------
  - name: "1.1.2.1 Configure /tmp (Audit - Manual intervention required)"
    ansible.builtin.debug:
      msg: "Manual audit required"
    tags: ["cis", "manual"]

  - name: "1.1.2.1 Configure /tmp (Remediation - Manual intervention required)"
    ansible.builtin.debug:
      msg: "Manual remediation required"
    tags: ["cis", "manual"]

    # ------------------------------------------------------------
    # 1.1.2.1.1 Ensure /tmp is tmpfs or a separate partition
    # ------------------------------------------------------------
  - name: "1.1.2.1.1 Ensure /tmp is tmpfs or a separate partition (Audit)"
    ansible.builtin.shell: |-
      findmnt -kn /tmp >/dev/null && systemctl is-enabled tmp.mount >/dev/null
    register: audit_1_1_2_1_1_0
    changed_when: false
    failed_when: audit_1_1_2_1_1_0.rc != 0
    ignore_errors: true
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "1.1.2.1.1 Ensure /tmp is tmpfs or a separate partition (Remediation)"
    ansible.builtin.shell: |
      systemctl unmask tmp.mount
      systemctl enable tmp.mount
      if ! grep -q "^tmpfs[[:space:]]\+/tmp[[:space:]]" /etc/fstab; then
        echo "tmpfs /tmp tmpfs defaults,rw,nosuid,nodev,noexec,relatime,size=2G 0 0" >> /etc/fstab
      fi
    register: rem_1_1_2_1_1_0
    changed_when: rem_1_1_2_1_1_0.rc == 0
    ignore_errors: true
    when: audit_1_1_2_1_1_0.rc != 0
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 1.1.2.1.2 Ensure nodev option set on /tmp partition
    # ------------------------------------------------------------
  - name: "1.1.2.1.2 Ensure nodev option set on /tmp partition (Audit - /tmp is a
      separate partition)"
    ansible.builtin.shell: |-
      findmnt -kn /tmp | grep -q nodev
    register: audit_1_1_2_1_2_0
    changed_when: false
    failed_when: audit_1_1_2_1_2_0.rc != 0
    ignore_errors: true
    when: ansible_mounts | selectattr('mount', 'equalto', '/tmp') | list | length
      > 0
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "1.1.2.1.2 Ensure nodev option set on /tmp partition (Remediation - /tmp
      is a separate partition)"
    ansible.builtin.shell: |
      mount -o remount,nodev /tmp || true
      awk '$2 == "/tmp" { if ($4 !~ /nodev/) $4 = $4 ",nodev" } 1' /etc/fstab > /etc/fstab.tmp && mv /etc/fstab.tmp /etc/fstab
    register: rem_1_1_2_1_2_0
    changed_when: rem_1_1_2_1_2_0.rc == 0
    ignore_errors: true
    when:
    - audit_1_1_2_1_2_0.rc != 0
    - ansible_mounts | selectattr('mount', 'equalto', '/tmp') | list | length > 0
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 1.1.2.1.3 Ensure nosuid option set on /tmp partition
    # ------------------------------------------------------------
  - name: "1.1.2.1.3 Ensure nosuid option set on /tmp partition (Audit - /tmp is a
      separate partition)"
    ansible.builtin.shell: |-
      findmnt -kn /tmp | grep -q nosuid
    register: audit_1_1_2_1_3_0
    changed_when: false
    failed_when: audit_1_1_2_1_3_0.rc != 0
    ignore_errors: true
    when: ansible_mounts | selectattr('mount', 'equalto', '/tmp') | list | length
