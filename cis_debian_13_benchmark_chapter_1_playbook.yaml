  - name: "1.1.2.2.1 Ensure /dev/shm is tmpfs or a separate partition (Remediation)"
    ansible.builtin.shell: |-
      if ! grep -q "^tmpfs[[:space:]]\+/dev/shm[[:space:]]" /etc/fstab; then
