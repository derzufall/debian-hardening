    ansible.builtin.shell: |
      if lsmod | grep -q "hfsplus"; then exit 1; fi
      if modprobe --showconfig | grep -Pq '\binstall\h+hfsplus\h+/bin/(true|false)\b' && modprobe --showconfig | grep -Pq '\bblacklist\h+hfsplus\b'; then exit 0; fi
      if ! find /lib/modules/$(uname -r)/ -name "hfsplus.ko*" -print -quit | grep -q .; then exit 0; fi
