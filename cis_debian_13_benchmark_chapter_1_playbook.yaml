    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "1.1.2.1.3 Ensure nosuid option set on /tmp partition (Remediation - /tmp
      is a separate partition)"
    ansible.builtin.shell: |
      mount -o remount,nosuid /tmp || true
      awk '$2 == "/tmp" { if ($4 !~ /nosuid/) $4 = $4 ",nosuid" } 1' /etc/fstab > /etc/fstab.tmp && mv /etc/fstab.tmp /etc/fstab
    register: rem_1_1_2_1_3_0
    changed_when: rem_1_1_2_1_3_0.rc == 0
    ignore_errors: true
    when:
    - audit_1_1_2_1_3_0.rc != 0
    - ansible_mounts | selectattr('mount', 'equalto', '/tmp') | list | length > 0
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 1.1.2.1.4 Ensure noexec option set on /tmp partition
    # ------------------------------------------------------------
