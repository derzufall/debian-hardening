    ansible.builtin.shell: |
      modprobe -r hfsplus 2>/dev/null || true
      rmmod hfsplus 2>/dev/null || true
      echo "install hfsplus /bin/false" > /etc/modprobe.d/60-hfsplus.conf
      echo "blacklist hfsplus" >> /etc/modprobe.d/60-hfsplus.conf
    register: rem_1_1_1_4_0
    changed_when: rem_1_1_1_4_0.rc == 0
    ignore_errors: true
    when: audit_1_1_1_4_0.rc != 0
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 1.1.1.5 Ensure jffs2 kernel module is not available
    # ------------------------------------------------------------
  - name: "1.1.1.5 Ensure jffs2 kernel module is not available (Audit)"
    ansible.builtin.shell: |
      if lsmod | grep -q "jffs2"; then exit 1; fi
      if modprobe --showconfig | grep -Pq '\binstall\h+jffs2\h+/bin/(true|false)\b' && modprobe --showconfig | grep -Pq '\bblacklist\h+jffs2\b'; then exit 0; fi
      if ! find /lib/modules/$(uname -r)/ -name "jffs2.ko*" -print -quit | grep -q .; then exit 0; fi
      exit 1
    register: audit_1_1_1_5_0
    changed_when: false
    failed_when: audit_1_1_1_5_0.rc != 0
    ignore_errors: true
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "1.1.1.5 Ensure jffs2 kernel module is not available (Remediation)"
    ansible.builtin.shell: |
      modprobe -r jffs2 2>/dev/null || true
      rmmod jffs2 2>/dev/null || true
      echo "install jffs2 /bin/false" > /etc/modprobe.d/60-jffs2.conf
      echo "blacklist jffs2" >> /etc/modprobe.d/60-jffs2.conf
    register: rem_1_1_1_5_0
    changed_when: rem_1_1_1_5_0.rc == 0
    ignore_errors: true
    when: audit_1_1_1_5_0.rc != 0
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 1.1.1.6 Ensure overlay kernel module is not available
    # ------------------------------------------------------------
  - name: "1.1.1.6 Ensure overlay kernel module is not available (Audit)"
    ansible.builtin.shell: |
      if lsmod | grep -q "overlay"; then exit 1; fi
      if modprobe --showconfig | grep -Pq '\binstall\h+overlay\h+/bin/(true|false)\b' && modprobe --showconfig | grep -Pq '\bblacklist\h+overlay\b'; then exit 0; fi
      if ! find /lib/modules/$(uname -r)/ -name "overlay.ko*" -print -quit | grep -q .; then exit 0; fi
      exit 1
    register: audit_1_1_1_6_0
    changed_when: false
    failed_when: audit_1_1_1_6_0.rc != 0
    ignore_errors: true
    when: not (docker_is_used | default(false))
    tags: ["level_2__server", "level_2__workstation", "cis", "automated"]

  - name: "1.1.1.6 Ensure overlay kernel module is not available (Remediation)"
    ansible.builtin.shell: |
      modprobe -r overlay 2>/dev/null || true
      rmmod overlay 2>/dev/null || true
      echo "install overlay /bin/false" > /etc/modprobe.d/60-overlay.conf
      echo "blacklist overlay" >> /etc/modprobe.d/60-overlay.conf
    register: rem_1_1_1_6_0
    changed_when: rem_1_1_1_6_0.rc == 0
    ignore_errors: true
    when:
      - not (docker_is_used | default(false))
      - audit_1_1_1_6_0.rc is defined
      - audit_1_1_1_6_0.rc != 0
    tags: ["level_2__server", "level_2__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 1.1.1.8 Ensure udf kernel module is not available
    # ------------------------------------------------------------
  - name: "1.1.1.8 Ensure udf kernel module is not available (Audit)"
    ansible.builtin.shell: |
      if lsmod | grep -q "udf"; then exit 1; fi
      if modprobe --showconfig | grep -Pq '\binstall\h+udf\h+/bin/(true|false)\b' && modprobe --showconfig | grep -Pq '\bblacklist\h+udf\b'; then exit 0; fi
      if ! find /lib/modules/$(uname -r)/ -name "udf.ko*" -print -quit | grep -q .; then exit 0; fi
