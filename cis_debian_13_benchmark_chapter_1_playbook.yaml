- name: "CIS Debian Linux 13 Benchmark Chapter 1 Playbook"
  hosts: all
  become: true
  gather_facts: true

  vars_files:
    - cis_vars.yaml

  vars:
    host_dest_dir_temp_base: "/tmp/cis_temp_dir"
    host_dest_file_ssh_config: "/etc/ssh/sshd_config"

  pre_tasks:
  - name: "Get current timestamp with millisecond precision"
    ansible.builtin.command: date +%s%3N
    register: timestamp_ms
    changed_when: false

  - name: "Gather package facts"
    ansible.builtin.package_facts:
      manager: auto

  - name: "Set temporary directory variable with timestamp"
    ansible.builtin.set_fact:
      host_dest_dir_temp_cis: "{{ host_dest_dir_temp_base }}_{{ timestamp_ms.stdout
        }}"

  - name: "Create the temporary directory"
    ansible.builtin.file:
      path: "{{ host_dest_dir_temp_cis }}"
      state: directory
      mode: "0700"
      owner: root
      group: root
    register: temp_dir_creation
    changed_when: temp_dir_creation.changed

  tasks:
    # ------------------------------------------------------------
    # 1.1 Filesystem
    # ------------------------------------------------------------
  - name: "1.1 Filesystem (Audit - Manual intervention required)"
    ansible.builtin.debug:
      msg: "Manual audit required"
    tags: ["cis", "manual"]

  - name: "1.1 Filesystem (Remediation - Manual intervention required)"
    ansible.builtin.debug:
      msg: "Manual remediation required"
    tags: ["cis", "manual"]

    # ------------------------------------------------------------
    # 1.1.1 Configure Filesystem Kernel Modules
    # ------------------------------------------------------------
  - name: "1.1.1 Configure Filesystem Kernel Modules (Audit - Manual intervention
      required)"
    ansible.builtin.debug:
      msg: "Manual audit required"
    tags: ["cis", "manual"]

  - name: "1.1.1 Configure Filesystem Kernel Modules (Remediation - Manual intervention
      required)"
    ansible.builtin.debug:
      msg: "Manual remediation required"
    tags: ["cis", "manual"]

    # ------------------------------------------------------------
    # 1.1.1.1 Ensure cramfs kernel module is not available
    # ------------------------------------------------------------
  - name: "1.1.1.1 Ensure cramfs kernel module is not available (Audit)"
    ansible.builtin.shell: |
      if lsmod | grep -q "cramfs"; then exit 1; fi
      if modprobe --showconfig | grep -Pq '\binstall\h+cramfs\h+/bin/(true|false)\b' && modprobe --showconfig | grep -Pq '\bblacklist\h+cramfs\b'; then exit 0; fi
      if ! find /lib/modules/$(uname -r)/ -name "cramfs.ko*" -print -quit | grep -q .; then exit 0; fi
      exit 1
    register: audit_1_1_1_1_0
    changed_when: false
    failed_when: audit_1_1_1_1_0.rc != 0
    ignore_errors: true
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "1.1.1.1 Ensure cramfs kernel module is not available (Remediation)"
    ansible.builtin.shell: |
      modprobe -r cramfs 2>/dev/null || true
      rmmod cramfs 2>/dev/null || true
      echo "install cramfs /bin/false" > /etc/modprobe.d/60-cramfs.conf
      echo "blacklist cramfs" >> /etc/modprobe.d/60-cramfs.conf
    register: rem_1_1_1_1_0
    changed_when: rem_1_1_1_1_0.rc == 0
    ignore_errors: true
    when: audit_1_1_1_1_0.rc != 0
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 1.1.1.3 Ensure hfs kernel module is not available
    # ------------------------------------------------------------
  - name: "1.1.1.3 Ensure hfs kernel module is not available (Audit)"
    ansible.builtin.shell: |
      if lsmod | grep -q "hfs"; then exit 1; fi
      if modprobe --showconfig | grep -Pq '\binstall\h+hfs\h+/bin/(true|false)\b' && modprobe --showconfig | grep -Pq '\bblacklist\h+hfs\b'; then exit 0; fi
      if ! find /lib/modules/$(uname -r)/ -name "hfs.ko*" -print -quit | grep -q .; then exit 0; fi
