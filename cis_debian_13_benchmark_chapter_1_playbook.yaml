    failed_when: audit_1_5_7_0.rc != 0
    ignore_errors: true
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "1.5.7 Ensure Automatic Error Reporting is configured (Remediation)"
    ansible.builtin.shell: |-
      systemctl stop apport.service 2>/dev/null || true
      systemctl mask apport.service 2>/dev/null || true
      apt-get purge -y apport
    register: rem_1_5_7_0
    changed_when: rem_1_5_7_0.rc == 0
    ignore_errors: true
    when: audit_1_5_7_0.rc != 0
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 1.5.8 Ensure kernel.kptr_restrict is configured
    # ------------------------------------------------------------
  - name: "1.5.8 Ensure kernel.kptr_restrict is configured (Audit)"
    ansible.builtin.shell: |-
      sysctl kernel.kptr_restrict | grep -E -q "(1|2)"
    register: audit_1_5_8_0
    changed_when: false
    failed_when: "audit_1_5_8_0.rc != 0"
    ignore_errors: true
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "1.5.8 Ensure kernel.kptr_restrict is configured (Remediation)"
    ansible.builtin.shell: |-
      echo "kernel.kptr_restrict = 2" > /etc/sysctl.d/60-kernel.conf && sysctl -w kernel.kptr_restrict=2
    register: rem_1_5_8_0
    changed_when: rem_1_5_8_0.rc == 0
    ignore_errors: true
    when: audit_1_5_8_0.rc != 0
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 1.5.11 Ensure core file size is configured
    # ------------------------------------------------------------
  - name: "1.5.11 Ensure core file size is configured (Audit)"
    ansible.builtin.shell: |-
      grep -Eq "^\s*\*\s+hard\s+core\s+0" /etc/security/limits.conf /etc/security/limits.d/* 2>/dev/null && ! grep -Eq "^\s*\*\s+hard\s+core\s+[1-9]" /etc/security/limits.conf /etc/security/limits.d/* 2>/dev/null
    register: audit_1_5_11_0
    changed_when: false
    failed_when: audit_1_5_11_0.rc != 0
    ignore_errors: true
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "1.5.11 Ensure core file size is configured (Remediation)"
    ansible.builtin.shell: |-
      echo "* hard core 0" > /etc/security/limits.d/60-limits.conf
    register: rem_1_5_11_0
    changed_when: rem_1_5_11_0.rc == 0
    ignore_errors: true
    when: audit_1_5_11_0.rc != 0
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 1.6 Configure Command Line Warning Banners
    # ------------------------------------------------------------
  - name: "1.6 Configure Command Line Warning Banners (Audit - Manual intervention
      required)"
    ansible.builtin.debug:
      msg: "Manual audit required"
    tags: ["cis", "manual"]

  - name: "1.6 Configure Command Line Warning Banners (Remediation - Manual intervention
      required)"
    ansible.builtin.debug:
      msg: "Manual remediation required"
    tags: ["cis", "manual"]

    # ------------------------------------------------------------
    # 1.6.1 Ensure /etc/motd is configured
    # ------------------------------------------------------------
  - name: "1.6.1 Ensure /etc/motd is configured (Audit)"
    ansible.builtin.shell: |-
      ! grep -Psqi '(\v|\r|\m|\s|Debian)' /etc/motd /etc/motd.d/* 2>/dev/null
    register: audit_1_6_1_0
    changed_when: false
    failed_when: "audit_1_6_1_0.rc != 0"
    ignore_errors: true
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "1.6.1 Ensure /etc/motd is configured (Remediation - motd is not used)"
    ansible.builtin.shell: |-
      rm -f /etc/motd /etc/motd.d/*
    register: rem_1_6_1_0
    changed_when: rem_1_6_1_0.rc == 0
    ignore_errors: true
    when:
    - audit_1_6_1_0.rc != 0
    - cis_use_motd | default(true) == false
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 1.6.2 Ensure /etc/issue is configured
    # ------------------------------------------------------------
  - name: "1.6.2 Ensure /etc/issue is configured (Audit)"
    ansible.builtin.shell: |-
      ! grep -Psqi '(\v|\r|\m|\s|Debian)' /etc/issue
    register: audit_1_6_2_0
    changed_when: false
    failed_when: audit_1_6_2_0.rc != 0
    ignore_errors: true
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "1.6.2 Ensure /etc/issue is configured (Remediation)"
    ansible.builtin.shell: |-
      echo "Authorized users only. All activity may be monitored and reported." > /etc/issue
    register: rem_1_6_2_0
    changed_when: rem_1_6_2_0.rc == 0
    ignore_errors: true
    when: audit_1_6_2_0.rc != 0
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 1.6.3 Ensure /etc/issue.net is configured
    # ------------------------------------------------------------
  - name: "1.6.3 Ensure /etc/issue.net is configured (Audit)"
    ansible.builtin.shell: |-
      ! grep -Psqi '(\v|\r|\m|\s|Debian)' /etc/issue.net
    register: audit_1_6_3_0
    changed_when: false
    failed_when: audit_1_6_3_0.rc != 0
    ignore_errors: true
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "1.6.3 Ensure /etc/issue.net is configured (Remediation)"
    ansible.builtin.shell: |-
      echo "Authorized users only. All activity may be monitored and reported." > /etc/issue.net
    register: rem_1_6_3_0
    changed_when: rem_1_6_3_0.rc == 0
    ignore_errors: true
    when: audit_1_6_3_0.rc != 0
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 1.6.4 Ensure access to /etc/motd is configured
    # ------------------------------------------------------------
  - name: "1.6.4 Ensure access to /etc/motd is configured (Audit)"
    ansible.builtin.shell: |-
      stat -c "%a %u %g" /etc/motd 2>/dev/null | grep -Eq "^(644|640|600|444|440|400) 0 0$"
    register: audit_1_6_4_0
    changed_when: false
    failed_when: audit_1_6_4_0.rc != 0
    ignore_errors: true
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "1.6.4 Ensure access to /etc/motd is configured (Remediation)"
    ansible.builtin.shell: |-
      chown root:root /etc/motd 2>/dev/null || true
      chmod 644 /etc/motd 2>/dev/null || true
    register: rem_1_6_4_0
    changed_when: rem_1_6_4_0.rc == 0
    ignore_errors: true
    when: audit_1_6_4_0.rc != 0
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 1.6.5 Ensure access to /etc/issue is configured
    # ------------------------------------------------------------
  - name: "1.6.5 Ensure access to /etc/issue is configured (Audit)"
    ansible.builtin.shell: |-
      stat -c "%a %u %g" /etc/issue | grep -Eq "^(644|640|600|444|440|400) 0 0$"
    register: audit_1_6_5_0
    changed_when: false
    failed_when: audit_1_6_5_0.rc != 0
    ignore_errors: true
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "1.6.5 Ensure access to /etc/issue is configured (Remediation)"
    ansible.builtin.shell: |-
      chown root:root /etc/issue 2>/dev/null || true
      chmod 644 /etc/issue 2>/dev/null || true
    register: rem_1_6_5_0
    changed_when: rem_1_6_5_0.rc == 0
    ignore_errors: true
    when: audit_1_6_5_0.rc != 0
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 1.6.6 Ensure access to /etc/issue.net is configured
    # ------------------------------------------------------------
  - name: "1.6.6 Ensure access to /etc/issue.net is configured (Audit)"
    ansible.builtin.shell: |-
      stat -c "%a %u %g" /etc/issue.net | grep -Eq "^(644|640|600|444|440|400) 0 0$"
    register: audit_1_6_6_0
    changed_when: false
    failed_when: audit_1_6_6_0.rc != 0
    ignore_errors: true
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "1.6.6 Ensure access to /etc/issue.net is configured (Remediation)"
    ansible.builtin.shell: |-
      chown root:root /etc/issue.net 2>/dev/null || true
      chmod 644 /etc/issue.net 2>/dev/null || true
    register: rem_1_6_6_0
    changed_when: rem_1_6_6_0.rc == 0
    ignore_errors: true
    when: audit_1_6_6_0.rc != 0
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 1.7 Configure GNOME Display Manager
    # ------------------------------------------------------------
  - name: "1.7 Configure GNOME Display Manager (Audit - Manual intervention required)"
    ansible.builtin.debug:
      msg: "Manual audit required"
    tags: ["cis", "manual"]

  - name: "1.7 Configure GNOME Display Manager (Remediation - Manual intervention
      required)"
    ansible.builtin.debug:
      msg: "Manual remediation required"
    tags: ["cis", "manual"]

    # ------------------------------------------------------------
    # 1.7.1 Ensure GDM is removed
    # ------------------------------------------------------------
  - name: "1.7.1 Ensure GDM is removed (Audit)"
    ansible.builtin.shell: |-
      ! dpkg-query -s gdm3 >/dev/null 2>&1
    register: audit_1_7_1_0
    changed_when: false
    failed_when: audit_1_7_1_0.rc != 0
    ignore_errors: true
    tags: ["level_2__server", "cis", "automated"]

  - name: "1.7.1 Ensure GDM is removed (Remediation)"
    ansible.builtin.shell: |-
      apt-get purge -y gdm3 && apt-get autoremove -y
    register: rem_1_7_1_0
    changed_when: rem_1_7_1_0.rc == 0
    ignore_errors: true
    when: audit_1_7_1_0.rc != 0
    tags: ["level_2__server", "cis", "automated"]

    # ------------------------------------------------------------
    # 1.7.2 Ensure GDM login banner is configured
    # ------------------------------------------------------------
  - name: "1.7.2 Ensure GDM login banner is configured (Audit)"
    ansible.builtin.shell: |-
      grep -q "banner-message-enable=true" /etc/gdm3/greeter.dconf-defaults 2>/dev/null
    register: audit_1_7_2_0
    changed_when: false
    failed_when: "audit_1_7_2_0.rc != 0"
    ignore_errors: true
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "1.7.2 Ensure GDM login banner is configured (Remediation - gdm3 is not
      installed)"
    ansible.builtin.shell: |-
      mkdir -p /etc/dconf/profile /etc/dconf/db/gdm.d
      echo -e "user-db:user\nsystem-db:gdm\nfile-db:/usr/share/gdm/greeter-dconf-defaults" > /etc/dconf/profile/gdm
      echo -e "[org/gnome/login-screen]\nbanner-message-enable=true\nbanner-message-text='Authorized uses only'" > /etc/dconf/db/gdm.d/01-banner-message
      dconf update 2>/dev/null || true
    register: rem_1_7_2_0
    changed_when: rem_1_7_2_0.rc == 0
    ignore_errors: true
    when:
    - audit_1_7_2_0.rc != 0
    - "'gdm3' in ansible_facts.packages"
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 1.7.3 Ensure GDM disable-user-list option is enabled
    # ------------------------------------------------------------
  - name: "1.7.3 Ensure GDM disable-user-list option is enabled (Audit)"
    ansible.builtin.shell: |-
      grep -q "disable-user-list=true" /etc/gdm3/greeter.dconf-defaults 2>/dev/null
    register: audit_1_7_3_0
    changed_when: false
    failed_when: "audit_1_7_3_0.rc != 0"
    ignore_errors: true
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "1.7.3 Ensure GDM disable-user-list option is enabled (Remediation - gdm3
      is installed)"
    ansible.builtin.shell: |-
      mkdir -p /etc/dconf/profile /etc/dconf/db/gdm.d
      echo -e "user-db:user\nsystem-db:gdm\nfile-db:/usr/share/gdm/greeter-dconf-defaults" > /etc/dconf/profile/gdm
      echo -e "[org/gnome/login-screen]\ndisable-user-list=true" > /etc/dconf/db/gdm.d/00-login-screen
      dconf update 2>/dev/null || true
    register: rem_1_7_3_0
    changed_when: rem_1_7_3_0.rc == 0
    ignore_errors: true
    when:
    - audit_1_7_3_0.rc != 0
    - "'gdm3' in ansible_facts.packages"
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 1.7.4 Ensure GDM screen locks when the user is idle
    # ------------------------------------------------------------
  - name: "1.7.4 Ensure GDM screen locks when the user is idle (Audit)"
    ansible.builtin.shell: |-
      gsettings get org.gnome.desktop.screensaver lock-delay 2>/dev/null | grep -q "uint32 [0-5]$" && gsettings get org.gnome.desktop.session idle-delay 2>/dev/null | grep -Eq "uint32 ([1-9]|[1-9][0-9]|[1-8][0-9]{2}|900)$"
    register: audit_1_7_4_0
    changed_when: false
    failed_when: audit_1_7_4_0.rc != 0
    ignore_errors: true
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "1.7.4 Ensure GDM screen locks when the user is idle (Remediation)"
    ansible.builtin.shell: |-
      mkdir -p /etc/dconf/profile /etc/dconf/db/local.d
      echo -e "user-db:user\nsystem-db:local" > /etc/dconf/profile/user
      echo -e "[org/gnome/desktop/screensaver]\nlock-delay=uint32 5\n[org/gnome/desktop/session]\nidle-delay=uint32 900" > /etc/dconf/db/local.d/00-screensaver
      dconf update 2>/dev/null || true
    register: rem_1_7_4_0
    changed_when: rem_1_7_4_0.rc == 0
    ignore_errors: true
    when:
    - audit_1_7_4_0.rc != 0
    - "'gdm3' in ansible_facts.packages"
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 1.7.8 Ensure GDM autorun-never is enabled
    # ------------------------------------------------------------
  - name: "1.7.8 Ensure GDM autorun-never is enabled (Audit)"
    ansible.builtin.shell: |-
      gsettings get org.gnome.desktop.media-handling autorun-never 2>/dev/null | grep -q "true"
    register: audit_1_7_8_0
    changed_when: false
    failed_when: "audit_1_7_8_0.rc != 0"
    ignore_errors: true
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "1.7.8 Ensure GDM autorun-never is enabled (Remediation - gdm3 is installed)"
    ansible.builtin.shell: |-
      mkdir -p /etc/dconf/profile /etc/dconf/db/local.d
      echo -e "user-db:user\nsystem-db:local" > /etc/dconf/profile/user
      echo -e "[org/gnome/desktop/media-handling]\nautorun-never=true" > /etc/dconf/db/local.d/00-media-autorun
      dconf update 2>/dev/null || true
    register: rem_1_7_8_0
    changed_when: rem_1_7_8_0.rc == 0
    ignore_errors: true
    when:
    - audit_1_7_8_0.rc != 0
    - "'gdm3' in ansible_facts.packages"
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 1.7.9 Ensure GDM autorun-never is not overridden
    # ------------------------------------------------------------
  - name: "1.7.9 Ensure GDM autorun-never is not overridden (Audit)"
    ansible.builtin.shell: |-
      grep -q "autorun-never=true" /etc/dconf/db/local.d/locks/* 2>/dev/null
    register: audit_1_7_9_0
    changed_when: false
    failed_when: audit_1_7_9_0.rc != 0
    ignore_errors: true
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "1.7.9 Ensure GDM autorun-never is not overridden (Remediation)"
    ansible.builtin.shell: |-
      mkdir -p /etc/dconf/db/local.d/locks
      echo -e "/org/gnome/desktop/media-handling/autorun-never" > /etc/dconf/db/local.d/locks/00-media-autorun
      dconf update 2>/dev/null || true
    register: rem_1_7_9_0
    changed_when: rem_1_7_9_0.rc == 0
    ignore_errors: true
    when: audit_1_7_9_0.rc != 0
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 1.7.10 Ensure XDMCP is not enabled
    # ------------------------------------------------------------
  - name: "1.7.10 Ensure XDMCP is not enabled (Audit)"
    ansible.builtin.shell: |-
      ! grep -Psqi '^\s*Enable\s*=\s*true' /etc/gdm3/custom.conf /etc/gdm3/daemon.conf 2>/dev/null
    register: audit_1_7_10_0
    changed_when: false
    failed_when: audit_1_7_10_0.rc != 0
    ignore_errors: true
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

  - name: "1.7.10 Ensure XDMCP is not enabled (Remediation)"
    ansible.builtin.shell: |-
      sed -i '/^Enable\s*=\s*true/s/^/#/' /etc/gdm3/custom.conf 2>/dev/null || true
    register: rem_1_7_10_0
    changed_when: rem_1_7_10_0.rc == 0
    ignore_errors: true
    when: audit_1_7_10_0.rc != 0
    tags: ["level_1__server", "level_1__workstation", "cis", "automated"]

    # ------------------------------------------------------------
    # 1.7.11 Ensure Xwayland is configured
    # ------------------------------------------------------------
  - name: "1.7.11 Ensure Xwayland is configured (Audit)"
    ansible.builtin.shell: |-
      grep -Psqi '^\s*WaylandEnable\s*=\s*false' /etc/gdm3/custom.conf /etc/gdm3/daemon.conf 2>/dev/null
    register: audit_1_7_11_0
    changed_when: false
    failed_when: audit_1_7_11_0.rc != 0
    ignore_errors: true
    tags: ["level_2__server", "level_2__workstation", "cis", "automated"]

  - name: "1.7.11 Ensure Xwayland is configured (Remediation)"
    ansible.builtin.shell: |-
      sed -i '/^\s*\[daemon\]/a WaylandEnable=false' /etc/gdm3/custom.conf 2>/dev/null || true
    register: rem_1_7_11_0
    changed_when: rem_1_7_11_0.rc == 0
    ignore_errors: true
    when: audit_1_7_11_0.rc != 0
    tags: ["level_2__server", "level_2__workstation", "cis", "automated"]

  post_tasks:
  - name: "Clean up the temporary directory"
    ansible.builtin.file:
      path: "{{ host_dest_dir_temp_cis }}"
      state: absent
    register: temp_cleanup
    changed_when: temp_cleanup.changed

